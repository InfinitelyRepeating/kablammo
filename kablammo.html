/* ============================================================
   SEQUENCER / TIMELINE  (dotplot: x = time, events stack on y)
   ============================================================ */
const TL_RULER_H=26, TL_LANE_H=22, TL_ICON=16, TL_MIN_LANES=4;
const TAIL=2.5;                     // let the last burst finish falling before we stop
const tlPanel=document.getElementById('tlPanel'), tlScroll=document.getElementById('tlScroll');
const tlInner=document.getElementById('tlInner'), tlCanvas=document.getElementById('tlCanvas');
const tlg=tlCanvas.getContext('2d');
const tlMenu=document.getElementById('tlMenu'), tlEdit=document.getElementById('tlEdit');
const tlPlayBtn=document.getElementById('tlPlay'), tlRecBtn=document.getElementById('tlRec');
const tlSnapBtn=document.getElementById('tlSnap'), tlMinBtn=document.getElementById('tlMin');
const tlLenEl=document.getElementById('tlLen'), tlClockEl=document.getElementById('tlClock');
let tlSel=null, tlDrag=null, tlPlaying=false, tlTime=0, tlLanes=TL_MIN_LANES, songName='song';
let lastClick={x:0,y:0};

const GLYPH={shell:'✷',ground:'▲',text:'T',song:'♪'};
function snapT(t){ return timeline.snap ? Math.round(t*4)/4 : Math.round(t*1000)/1000; }
function fmtTime(t){ const m=Math.floor(t/60), s=t-m*60;
  return m+':'+(s<10?'0':'')+(Math.abs(s-Math.round(s))<0.005?Math.round(s):s.toFixed(2)); }
function fmtClock(t){ const m=Math.floor(t/60), s=t-m*60; return m+':'+(s<10?'0':'')+s.toFixed(1); }
function niceStep(z){ for(const s of [0.25,0.5,1,2,5,10,15,30,60,120,300]) if(s*z>=64) return s; return 600; }

/* longer events sit in lower lanes; a placed event keeps its lane until something changes */
function relayout(){
  const lanes=[];
  const place=(e,minLane)=>{ let L=minLane;
    for(;;){ const row=lanes[L]||(lanes[L]=[]);
      if(!row.some(o=>e.t0<o.t1-1e-6 && o.t0<e.t1-1e-6)){ row.push(e); e.lane=L; return; } L++; } };
  const ev=timeline.events;
  const songs=ev.filter(e=>e.kind==='song');
  const texts=ev.filter(e=>e.kind==='text');
  const rest=ev.filter(e=>e.kind!=='song'&&e.kind!=='text').sort((a,b)=>(b.t1-b.t0)-(a.t1-a.t0));
  songs.forEach(e=>place(e,0));                         // songs always occupy lane 0
  texts.forEach(e=>place(e, songs.length?1:0));         // text takes lane 0 or 1
  const base=(songs.length?1:0)+(texts.length?1:0);
  rest.forEach(e=>place(e,base));
  tlLanes=Math.max(TL_MIN_LANES,lanes.length);
}
function tlContentH(){ return TL_RULER_H+tlLanes*TL_LANE_H+10; }   // full height of all lanes
function tlViewH(){ return Math.min(tlContentH(), Math.round(window.innerHeight*0.38)); }
function tlResize(){
  if(tlPanel.classList.contains('collapsed')) return;
  const contentH=tlContentH(), viewH=tlViewH();
  tlInner.style.width=Math.max(1,timeline.duration*timeline.zoom)+'px';
  tlInner.style.height=contentH+'px';                 // real content size -> scrollbars track it
  const w=tlScroll.clientWidth||300, d=Math.min(window.devicePixelRatio||1,2);
  tlCanvas.style.width=w+'px'; tlCanvas.style.height=viewH+'px';   // canvas = just the visible window
  tlCanvas.width=Math.round(w*d); tlCanvas.height=Math.round(viewH*d);
  tlg.setTransform(d,0,0,d,0,0);
  tlCanvas.style.left=tlScroll.scrollLeft+'px';
  const maxTop=Math.max(0,contentH-viewH);
  if(tlScroll.scrollTop>maxTop) tlScroll.scrollTop=maxTop;   // events deleted -> don't strand the view
  tlCanvas.style.top=tlScroll.scrollTop+'px';
  tlLenEl.textContent=fmtTime(timeline.duration);
}
function drawEvent(e,off,voff,w,vh){
  const z=timeline.zoom, t1=(e.t1==null?e.t0+0.6:e.t1);
  let x0=e.t0*z-off, x1=t1*z-off;
  if(x1<-6||x0>w+6) return;
  const y=TL_RULER_H+e.lane*TL_LANE_H+3-voff, hh=TL_LANE_H-6, wid=Math.max(TL_ICON+4,x1-x0);
  if(y+hh<=TL_RULER_H || y>=vh) return;               // scrolled under the ruler or past the bottom
  if(e.kind==='song' && analysis){                                   // energy-colored song bar
    const n=analysis.energy.length, xa=Math.max(0,x0), xb=Math.min(w,x0+wid);
    for(let x=xa;x<xb;x++){ const frac=(x-x0)/wid, v=analysis.energy[Math.min(n-1,Math.max(0,Math.floor(frac*n)))]||0;
      tlg.fillStyle=`hsl(${210-v*210},85%,${20+v*34}%)`; tlg.fillRect(x,y,1,hh); }
    if(analysis.accents){                                            // musical hits: aim your shells here
      tlg.fillStyle='rgba(255,255,255,0.55)';
      const dur=analysis.duration||1;
      for(const a of analysis.accents){ const ax=x0+(a.t/dur)*wid;
        if(ax>=xa && ax<=xb) tlg.fillRect(ax,y,1,Math.max(2,hh*0.28*a.s)); }
    }
  } else {
    const c=(e.color&&COLORS[e.color])||[170,175,190], multi=(e.color==='multi');
    tlg.fillStyle=multi?'rgba(200,160,255,0.30)':`rgba(${c[0]},${c[1]},${c[2]},0.28)`;
    tlg.fillRect(x0,y,wid,hh);
    tlg.strokeStyle=multi?'rgba(220,180,255,0.85)':`rgba(${c[0]},${c[1]},${c[2]},0.85)`;
    tlg.lineWidth=1; tlg.strokeRect(x0+0.5,y+0.5,wid-1,hh-1);
  }
  if(tlSel===e){ tlg.strokeStyle='#fff'; tlg.lineWidth=1.4; tlg.strokeRect(x0-1.5,y-1.5,wid+3,hh+3); }
  tlg.fillStyle='rgba(10,8,6,0.88)'; tlg.fillRect(x0,y,TL_ICON,hh);       // icon = drag the start time
  tlg.fillStyle='#ffd68a'; tlg.font='10px "Space Mono",monospace'; tlg.textAlign='center'; tlg.textBaseline='middle';
  tlg.fillText(GLYPH[e.kind]||'?',x0+TL_ICON/2,y+hh/2); tlg.textAlign='left';
  tlg.fillStyle='rgba(255,255,255,0.55)';
  tlg.fillRect(x0,y,2,hh);                                               // left grip  = start
  tlg.fillRect(x0+wid-2,y,2,hh);                                         // right grip = end
}
function tlDraw(){
  if(tlPanel.classList.contains('collapsed')) return;
  const off=tlScroll.scrollLeft, voff=tlScroll.scrollTop, w=tlScroll.clientWidth, z=timeline.zoom, h=tlViewH();
  tlg.clearRect(0,0,w,h);
  tlg.fillStyle='#0c0a09'; tlg.fillRect(0,0,w,h);
  for(let L=0;L<tlLanes;L++){ const y=TL_RULER_H+L*TL_LANE_H-voff;
    if(y+TL_LANE_H<TL_RULER_H||y>h) continue;
    tlg.fillStyle=(L%2)?'#100d0c':'#0d0b0a'; tlg.fillRect(0,y,w,TL_LANE_H); }
  const step=niceStep(z), tA=Math.floor(off/z/step)*step, tB=(off+w)/z;
  tlg.font='9px "Space Mono",monospace'; tlg.textBaseline='middle';
  for(let t=tA;t<=tB;t+=step){ const x=t*z-off;
    tlg.strokeStyle='rgba(255,180,90,0.14)'; tlg.beginPath(); tlg.moveTo(x,TL_RULER_H); tlg.lineTo(x,h); tlg.stroke(); }
  for(const e of timeline.events) drawEvent(e,off,voff,w,h);
  const px=tlTime*z-off;
  if(px>=-2&&px<=w+2){ tlg.strokeStyle='#ff5a2c'; tlg.lineWidth=1.5; tlg.beginPath(); tlg.moveTo(px,TL_RULER_H); tlg.lineTo(px,h); tlg.stroke(); }
  // ruler is pinned to the top of the viewport, above the scrolling lanes
  tlg.fillStyle='#151110'; tlg.fillRect(0,0,w,TL_RULER_H);
  for(let t=tA;t<=tB;t+=step){ const x=t*z-off; if(x<-40) continue;
    tlg.strokeStyle='rgba(255,180,90,0.3)'; tlg.beginPath(); tlg.moveTo(x,TL_RULER_H-7); tlg.lineTo(x,TL_RULER_H); tlg.stroke();
    tlg.fillStyle='#dee8ff'; tlg.fillText(fmtTime(t),x+3,TL_RULER_H/2-1); }
  if(voff>0){ tlg.fillStyle='rgba(255,180,90,0.5)';           // hint that more lanes sit above
    tlg.fillRect(w-14,TL_RULER_H+2,10,2); tlg.fillRect(w-12,TL_RULER_H+6,6,2); }
}
function tlRefresh(){ relayout(); tlResize(); tlDraw(); if(typeof updateRecLabel==='function') updateRecLabel(); }
function tlOpen(){ tlPanel.classList.remove('collapsed'); tlMinBtn.textContent='▾'; tlMinBtn.classList.add('on'); tlRefresh(); }

/* ---- interaction ---- */
function tlAbs(ev){ const r=tlScroll.getBoundingClientRect();
  return {ax:ev.clientX-r.left+tlScroll.scrollLeft, y:ev.clientY-r.top, vy:ev.clientY-r.top}; }
function hitEvent(ax,y){
  const z=timeline.zoom, cy=y+tlScroll.scrollTop, lane=Math.floor((cy-TL_RULER_H)/TL_LANE_H);
  if(lane<0) return null;
  for(const e of timeline.events){ if(e.lane!==lane) continue;
    const x0=e.t0*z, x1=Math.max(x0+TL_ICON+4,(e.t1==null?e.t0+0.6:e.t1)*z);
    if(ax>=x0-6 && ax<=x1+6){
      if(ax<=x0+TL_ICON) return {e,mode:'start'};   // icon = drag the start time
      if(ax>=x1-8) return {e,mode:'end'};           // right edge = drag the end
      return {e,mode:'body'};                       // body = move, or open the editor
    } }
  return null;
}
const MOVE_TOL=8;
let downPt=null, panning=null, movedFar=false, scrubbing=false;

tlCanvas.addEventListener('pointerdown',ev=>{
  if(ev.button===2) return;
  const {ax,y}=tlAbs(ev), z=timeline.zoom;
  lastClick={x:ev.clientX,y:ev.clientY}; closeMenu();
  movedFar=false; downPt={ax,y,cx:ev.clientX};
  if(y<TL_RULER_H){                                  // ruler: press and drag to scrub
    scrubbing=true; tlCanvas.setPointerCapture(ev.pointerId);
    tlTime=Math.max(0,Math.min(timeline.duration,ax/z));
    tlClockEl.textContent=fmtClock(tlTime); tlDraw(); return;
  }
  const hit=hitEvent(ax,y);

  // precise handles drag immediately on every device
  if(hit && (hit.mode==='start'||hit.mode==='end')){
    tlDrag={...hit, dur:(hit.e.t1||hit.e.t0)-hit.e.t0};
    tlSel=hit.e; tlCanvas.setPointerCapture(ev.pointerId); tlDraw(); return;
  }
  if(hit){                                          // body: drag moves it, tap opens the editor
    tlSel=hit.e; tlDrag={e:hit.e,mode:'pending-move',grab:ax/z-hit.e.t0,dur:(hit.e.t1||hit.e.t0)-hit.e.t0};
    tlCanvas.setPointerCapture(ev.pointerId); tlDraw(); return;
  }
  // empty track: touch never creates by accident — drag pans, tap just deselects
  closeEditor(); tlSel=null;
  if(isTouch){ panning={sl:tlScroll.scrollLeft,cx:ev.clientX}; tlCanvas.setPointerCapture(ev.pointerId); }
  else openMenu(ev.clientX,ev.clientY,ax/z);        // desktop: a click can't misfire, so create directly
  tlDraw();
});
tlCanvas.addEventListener('pointermove',ev=>{
  const {ax,y}=tlAbs(ev), z=timeline.zoom;
  if(downPt && Math.abs(ev.clientX-downPt.cx)>MOVE_TOL) movedFar=true;

  if(scrubbing){                                     // drag along the ruler to move the playhead
    tlTime=Math.max(0,Math.min(timeline.duration,ax/z));
    tlClockEl.textContent=fmtClock(tlTime); autoPan(ev.clientX); tlDraw(); return; }

  if(panning){ if(movedFar){ tlScroll.scrollLeft=Math.max(0,panning.sl-(ev.clientX-panning.cx));
      tlCanvas.style.left=tlScroll.scrollLeft+'px'; tlDraw(); } return; }

  if(!tlDrag){ const h=hitEvent(ax,y);
    tlCanvas.style.cursor = y<TL_RULER_H?'ew-resize'
      : (h? ((h.mode==='start'||h.mode==='end')?'ew-resize':'grab') : 'crosshair');
    return; }

  if(tlDrag.mode==='pending-move'){ if(!movedFar) return; tlDrag.mode='move'; closeEditor(); }

  const t=ax/z, e=tlDrag.e;
  if(tlDrag.mode==='move'){ e.t0=Math.max(0,snapT(t-tlDrag.grab)); e.t1=e.t0+tlDrag.dur; }
  else if(tlDrag.mode==='end'){ e.t1=Math.max(e.t0+0.1,snapT(t)); }
  else if(tlDrag.mode==='start'){ const t1=e.t1==null?e.t0+0.6:e.t1;
    e.t0=Math.max(0,Math.min(t1-0.1,snapT(t))); }                 // resize from the left, end stays put
  if(e.t1>timeline.duration) timeline.duration=Math.ceil(e.t1/10)*10;
  autoPan(ev.clientX);                                            // keep the handle under the finger
  relayout(); tlResize(); tlDraw();
});
/* nudge the view when a drag reaches the edge, instead of letting the page scroll away */
function autoPan(clientX){
  const r=tlScroll.getBoundingClientRect(), edge=44;
  let d=0;
  if(clientX>r.right-edge) d=(clientX-(r.right-edge))*0.35;
  else if(clientX<r.left+edge) d=(clientX-(r.left+edge))*0.35;
  if(d){ tlScroll.scrollLeft=Math.max(0,tlScroll.scrollLeft+d); tlCanvas.style.left=tlScroll.scrollLeft+'px'; }
}
function endTlPointer(ev){
  panning=null; scrubbing=false;
  if(tlDrag){
    const wasTap=(tlDrag.mode==='pending-move' && !movedFar), e=tlDrag.e;
    tlDrag=null;
    if(wasTap) openEditor(e, ev?ev.clientX:lastClick.x, ev?ev.clientY:lastClick.y);   // tap = edit
    else tlRefresh();
  }
  downPt=null;
}
tlCanvas.addEventListener('pointerup',endTlPointer);
tlCanvas.addEventListener('pointercancel',()=>{ panning=null; scrubbing=false; tlDrag=null; downPt=null; });
tlScroll.addEventListener('scroll',()=>{ tlCanvas.style.left=tlScroll.scrollLeft+'px';
  tlCanvas.style.top=tlScroll.scrollTop+'px'; tlDraw(); });
tlScroll.addEventListener('wheel',ev=>{
  // Positional rule: over the ruler the wheel zooms the time scale. Off the ruler it scrolls —
  // vertically if the lanes overflow, otherwise the vertical wheel is redirected to horizontal
  // so a plain mouse can still move along the timeline.
  const r=tlScroll.getBoundingClientRect(), sx=ev.clientX-r.left, vy=ev.clientY-r.top;
  const onRuler = vy>=0 && vy<TL_RULER_H;
  if(!onRuler){
    const vOverflow=tlContentH()>tlScroll.clientHeight+1;
    if(!vOverflow && ev.deltaY && !ev.deltaX){       // no lanes to scroll -> walk the timeline instead
      ev.preventDefault();
      tlScroll.scrollLeft=Math.max(0,tlScroll.scrollLeft+ev.deltaY);
      tlCanvas.style.left=tlScroll.scrollLeft+'px'; tlDraw();
    }
    return;                                          // otherwise let native scrolling handle it
  }
  ev.preventDefault();
  const tAt=(sx+tlScroll.scrollLeft)/timeline.zoom;
  const delta=ev.deltaY||ev.deltaX;
  timeline.zoom=Math.max(3,Math.min(600,timeline.zoom*(delta<0?1.18:1/1.18)));
  tlResize();
  tlScroll.scrollLeft=Math.max(0,tAt*timeline.zoom-sx);
  tlCanvas.style.left=tlScroll.scrollLeft+'px'; tlDraw();
},{passive:false});

/* ---- create menu ---- */
function closeMenu(){ tlMenu.classList.remove('on'); }
function openMenu(cx,cy,t){
  const hasSong=timeline.events.some(e=>e.kind==='song');
  const canSong=!!audioPlayer.buf && !hasSong && !anyPlaying();     // song only if one isn't already playing
  tlMenu.innerHTML='';
  const add=(label,kind,dis)=>{ const d=document.createElement('div'); d.className='mi'+(dis?' dis':'');
    d.textContent=label; if(!dis) d.onclick=()=>{ closeMenu(); createEvent(kind,t); }; tlMenu.appendChild(d); };
  add('✷   Shell','shell',false);
  add('▲   Ground effect','ground',false);
  add('T   Text message','text',false);
  add('♪   Song','song',!canSong);
  tlMenu.style.left=Math.min(cx,window.innerWidth-215)+'px';
  tlMenu.style.top=Math.max(8,cy-170)+'px';
  tlMenu.classList.add('on');
}
function createEvent(kind,t){
  t=Math.max(0,snapT(t)); let e;
  if(kind==='shell') e={id:nextId(),kind,t0:t,t1:t+1.2,shell:curShell,color:curColor,
    params:{...shellParams[curShell]},custom:copyCustom(curShell==='custom'?customShell:null),x:0.5,y:0.35};
  else if(kind==='ground') e={id:nextId(),kind,t0:t,t1:t+(GROUND_DUR[curGround]||1.5),ground:curGround,
    color:curColor,rtp:{radius:1,trails:0.5,persist:1},x:0.5};
  else if(kind==='text') e={id:nextId(),kind,t0:t,t1:t+5,text:(msgInput.value.trim()||'HAPPY BIRTHDAY')};
  else if(kind==='song') e={id:nextId(),kind,t0:t,t1:t+(audioPlayer.dur||30),name:songName};
  else return;
  timeline.events.push(e);
  if(e.t1>timeline.duration) timeline.duration=Math.ceil((e.t1+5)/10)*10;
  tlRefresh(); openEditor(e,lastClick.x,lastClick.y);
}

/* ---- event editor: a simplified firing console ---- */
function closeEditor(){ tlEdit.classList.remove('on'); tlSel=null; }
function elRow(parent,label){ const d=document.createElement('div'); d.className='erow';
  if(label){ const l=document.createElement('span'); l.className='blbl'; l.textContent=label; d.appendChild(l); }
  parent.appendChild(d); return d; }
function numBox(val,cb){ const i=document.createElement('input'); i.type='number'; i.step='0.05'; i.className='num';
  i.value=(+val).toFixed(2); i.onchange=()=>cb(parseFloat(i.value)||0); return i; }
function sldrLabeled(label,min,max,step,val,cb){ const l=document.createElement('label'); l.className='sld'; l.title=label;
  const i=document.createElement('input'); i.type='range'; i.min=min; i.max=max; i.step=step; i.value=val;
  i.oninput=()=>cb(parseFloat(i.value));
  const s=document.createElement('span'); s.textContent=label;
  l.append(i,s); return l; }
function sldrRow(parent,items){ const r=document.createElement('div'); r.className='erow sldrow';
  items.forEach(x=>r.appendChild(x)); parent.appendChild(r); return r; }

/* Position pad. Storage is unchanged — x/y are still 0..1 in the saved design frame — but the
   box itself is drawn in the DEVICE's current orientation, and the whole box is the placement
   area. Tall phone -> tall box; laptop -> wide box. */
function makePosPad(e,onChange){
  const wrap=document.createElement('div'); wrap.className='padwrap';
  const pad=document.createElement('canvas'); pad.className='pad';
  const skyAspect=Math.max(0.45,Math.min(3,(W||16)/(horizonY||9)));   // the device's actual sky
  const PW=340, PH=Math.round(PW/skyAspect);
  pad.width=PW; pad.height=PH;
  pad.style.aspectRatio=skyAspect.toFixed(4);
  const cap=document.createElement('div'); cap.className='padcap';
  wrap.append(pad,cap);

  const det=o=>(o.t1==null?o.t0+0.6:o.t1);           // detonation = the box's right edge
  const overlapping=()=>timeline.events.filter(o=>o!==e && o.kind==='shell'
    && e.t0 < det(o) && o.t0 < det(e));

  /* number the others by detonation order relative to this shell:
     negative = bursts earlier, 0 = same instant, positive = later; ties share a number */
  function ranks(others){
    const EPS=1e-6;
    const times=[...new Set([det(e),...others.map(det)].map(t=>Math.round(t/EPS)))].sort((a,b)=>a-b);
    const idxOf=t=>times.indexOf(Math.round(t/EPS));
    const base=idxOf(det(e));
    return o=>idxOf(det(o))-base;
  }

  function draw(){
    const g=pad.getContext('2d');
    g.fillStyle='#05060f'; g.fillRect(0,0,PW,PH);                    // the whole box is the sky
    g.strokeStyle='rgba(255,180,90,0.10)'; g.lineWidth=1;
    for(let i=1;i<3;i++){                                            // thirds guides
      g.beginPath(); g.moveTo(PW*i/3,0); g.lineTo(PW*i/3,PH); g.stroke();
      g.beginPath(); g.moveTo(0,PH*i/3); g.lineTo(PW,PH*i/3); g.stroke();
    }
    g.fillStyle='rgba(120,140,200,0.20)'; g.fillRect(0,PH-7,PW,7);   // horizon
    const px=x=>x*PW, py=y=>y*PH;                                    // full box == full 0..1 range
    const cross=(cx,cy,col,r,lw)=>{ g.strokeStyle=col; g.lineWidth=lw;
      g.beginPath(); g.moveTo(cx-r,cy); g.lineTo(cx+r,cy); g.moveTo(cx,cy-r); g.lineTo(cx,cy+r); g.stroke();
      g.beginPath(); g.arc(cx,cy,r*0.55,0,6.283); g.stroke(); };
    const others=overlapping(), rank=ranks(others);
    g.font='10px "Space Mono",monospace'; g.textAlign='center'; g.textBaseline='middle';
    for(const o of others){
      const cx=px(o.x), cy=py(o.y), n=rank(o);
      cross(cx,cy,'rgba(180,190,210,0.40)',6,1);
      const lab=n>0?'+'+n:String(n);
      g.fillStyle='rgba(0,0,0,0.65)'; g.fillRect(cx+7,cy-13,lab.length*7+4,12);
      g.fillStyle=n===0?'#ffd68a':'rgba(200,210,230,0.85)';
      g.fillText(lab,cx+9+lab.length*3.5,cy-7);
    }
    const c=(e.color&&COLORS[e.color])||[255,190,74];
    cross(px(e.x),py(e.y),`rgb(${c[0]},${c[1]},${c[2]})`,10,1.5);
    g.textAlign='left';
    const n=others.length;
    cap.textContent=`x ${(e.x*100).toFixed(0)}%  ·  y ${((1-e.y)*100).toFixed(0)}%`
      +(n?`  ·  ${n} other shell${n>1?'s':''} in the air (numbered by burst order)`:'');
  }
  pad.addEventListener('pointerdown',ev=>{                 // tap anywhere in the box to place
    const r=pad.getBoundingClientRect();
    e.x=Math.max(0.02,Math.min(0.98,(ev.clientX-r.left)/r.width));
    e.y=Math.max(0.05,Math.min(0.95,(ev.clientY-r.top)/r.height));
    draw(); if(onChange) onChange();
  });
  draw();
  return wrap;
}

/* secondary dialog, so the pad is never on screen by accident */
function openPosDialog(e,onDone){
  const ov=document.getElementById('posOverlay'), dlg=document.getElementById('posDlg');
  dlg.innerHTML='';
  const h=document.createElement('div'); h.className='bhead'; h.textContent='◈ SET POSITION';
  const body=document.createElement('div'); body.className='posbody';
  body.appendChild(makePosPad(e,null));
  const hint=document.createElement('div'); hint.className='bnote';
  hint.style.textAlign='center'; hint.textContent='Tap the sky to place the burst';
  body.appendChild(hint);
  const foot=document.createElement('div'); foot.className='bfoot';
  const done=document.createElement('button'); done.className='btn'; done.id='posDone'; done.textContent='Done';
  done.onclick=()=>{ ov.classList.remove('on'); if(onDone) onDone(); };
  foot.appendChild(done);
  dlg.append(h,body,foot);
  ov.classList.add('on');
  ov.onpointerdown=ev=>{ if(ev.target===ov){ ov.classList.remove('on'); if(onDone) onDone(); } };
}
function selBox(opts,val,cb){ const s=document.createElement('select'); s.className='sel';

function tlFire(e){
  if(e.kind==='shell'){ const frames=Math.max(8,(e.t1-e.t0)*60);   // right edge = the burst, so pick the velocity
    launch(showX(e.x), showY(e.y), {fuse:frames,shell:e.shell,colorName:e.color,params:e.params,custom:e.custom,noRec:true}); }
  else if(e.kind==='ground'){ e._em=groundShot(e.ground, showX(e.x), {dur:e.t1-e.t0,colorName:e.color,rtp:e.rtp,noRec:true}); }
  else if(e.kind==='text'){ setMessageTimed(e.text, e.t1-e.t0); }
  else if(e.kind==='song'){ if(audioPlayer.buf){ audioPlayer.offset=0; audioPlayer.play({loop:false}); updatePlayUI(); } }
}
function tlEndEvent(e){
  if(e.kind==='text') setMessage('');

  else if(e.kind==='ground' && e._em && e._em.life!==undefined) e._em.life=0;

function showEndTime(){                              // when the last marked event finishes
  let last=0;
  for(const e of timeline.events) last=Math.max(last, e.t1!=null?e.t1:e.t0+0.6);

function tlTick(dt){
  if(recording){                                   // playhead tracks the live recording clock
    tlTime=recNow()+recOffset;
    if(tlTime>timeline.duration){ timeline.duration=Math.ceil((tlTime+10)/10)*10; tlResize(); }
    tlClockEl.textContent=fmtClock(tlTime); tlFollowPlayhead(); tlDraw(); return;
  }
  if(!tlPlaying) return;
  tlTime+=dt/60;
  for(const e of timeline.events){
    if(!e._fired && e.t0<=tlTime){ tlFire(e); e._fired=true; }
    if(e._fired && !e._ended && e.t1!=null && tlTime>=e.t1){ tlEndEvent(e); e._ended=true; }
  }
  // stop when the show is actually over, not when the (possibly padded) timeline runs out
  const end=Math.min(showEndTime()+TAIL, timeline.duration);
  if(tlTime>=end) tlStop();
  tlClockEl.textContent=fmtClock(tlTime);
  tlFollowPlayhead(); tlDraw();
}

/* ============================================================
   SYNC SCORE — how well does the show match the music?
   Three independent signals, deliberately measuring different failures:
     1. Accent sync (F1): are bursts ON the hits, and did you cover the big hits?
     2. Energy tracking (Pearson r): does firework density follow the music's arc?
     3. Dynamics + climax: does the show swell like the music, and peak where it peaks?
   ============================================================ */
function smoothArr(a,halfWin){
  const n=a.length, pre=new Float64Array(n+1);
  for(let i=0;i<n;i++) pre[i+1]=pre[i]+a[i];
  const out=new Array(n);
  for(let i=0;i<n;i++){ const lo=Math.max(0,i-halfWin), hi=Math.min(n,i+halfWin+1);
    out[i]=(pre[hi]-pre[lo])/(hi-lo); }
  return out;
}
function pearson(a,b){
  const n=Math.min(a.length,b.length); if(n<3) return 0;
  let ma=0,mb=0; for(let i=0;i<n;i++){ ma+=a[i]; mb+=b[i]; } ma/=n; mb/=n;
  let num=0,da=0,db=0;
  for(let i=0;i<n;i++){ const x=a[i]-ma, y=b[i]-mb; num+=x*y; da+=x*x; db+=y*y; }
  const den=Math.sqrt(da*db);
  return den<1e-9 ? 0 : num/den;
}
function scoreShow(){
  if(!analysis) return {error:'Load a song first — there’s nothing to match against.'};
  const song=songOnTimeline();
  if(!song) return {error:'Put the song on the timeline so I know where it starts.'};
  const fs=analysis.frameSec, N=analysis.energy.length, t0=song.t0;
  const det=e=>(e.t1==null?e.t0+0.6:e.t1);
  const shells=timeline.events.filter(e=>e.kind==='shell');
  const grounds=timeline.events.filter(e=>e.kind==='ground');
  if(!shells.length && !grounds.length) return {error:'No fireworks on the timeline yet.'};

  /* --- build the show's intensity envelope on the music's own frame grid --- */
  const inten=new Float64Array(N);
  const bursts=[];
  const decay=Math.round(1.6/fs);
  for(const e of shells){
    const td=det(e)-t0; if(td<-1 || td>=N*fs) continue;
    const w=(e.params&&e.params.radius)||1;
    bursts.push(td);
    const i0=Math.floor(td/fs);
    for(let k=0;k<decay;k++){ const i=i0+k; if(i<0) continue; if(i>=N) break;
      inten[i]+= w*Math.exp(-k*fs/0.6); }              // flash, then fade
  }
  for(const e of grounds){                              // ground effects burn steadily
    const a=Math.max(0,Math.floor((e.t0-t0)/fs)), b=Math.min(N,Math.ceil((e.t1-t0)/fs));
    const w=0.5*((e.rtp&&e.rtp.radius)||1);
    for(let i=a;i<b;i++) inten[i]+=w;
  }
  const half=Math.max(1,Math.round(1.5/fs));
  const showEnv=smoothArr(Array.from(inten),half);
  const musEnv=analysis.energy;

  /* --- 1. accent sync: precision + recall against detected onsets ---
     Accents are weighted by how loud the music is there: you shouldn't be scored
     for "missing" a beat during a quiet passage. Only the hits that matter count. */
  const TOL=0.20;                                       // a burst within 200ms reads as "on the hit"
  const eAt=t=>analysis.energy[Math.max(0,Math.min(N-1,Math.floor(t/fs)))]||0;
  const accents=(analysis.accents||[]).filter(a=>a.t<N*fs)
    .map(a=>({t:a.t, s:a.s, w:a.s*eAt(a.t)}));          // importance = onset strength x loudness
  const ranked=[...accents].sort((a,b)=>b.w-a.w);
  const strong=ranked.slice(0, Math.max(6, Math.round(accents.length*0.35)));   // the hits that matter
  const nearest=(t,list)=>list.reduce((best,x)=>{
    const d=Math.abs((x&&x.t!==undefined?x.t:x)-t); return d<best?d:best; }, Infinity);
  let precision=0;
  if(bursts.length) precision = bursts.filter(t=>nearest(t,accents)<=TOL).length / bursts.length;
  let recall=0;
  if(strong.length) recall = strong.filter(a=>nearest(a.t,bursts)<=TOL).length / strong.length;
  const f1 = (precision+recall)>0 ? 2*precision*recall/(precision+recall) : 0;

  /* --- 2. energy tracking --- */
  const r=pearson(showEnv,musEnv);
  const track=Math.max(0,r);                            // negative correlation = fighting the music

  /* --- 3. dynamics + climax ---
     Dynamics: does the show swell and ebb as much as the music? Ratio, not difference,
     so "half as varied" and "twice as varied" are penalised symmetrically. */
  const cv=a=>{ const m=a.reduce((x,y)=>x+y,0)/a.length;
    if(m<1e-9) return 0;
    return Math.sqrt(a.reduce((x,y)=>x+(y-m)*(y-m),0)/a.length)/m; };
  const cvShow=cv(showEnv), cvMus=cv(musEnv);
  const dynamics = (cvShow<1e-6||cvMus<1e-6) ? 0
    : Math.min(cvShow,cvMus)/Math.max(cvShow,cvMus);
  /* Climax: centroid of the top decile, so a long loud plateau doesn't snap to its first frame. */
  const peakTime=a=>{ const mx=Math.max(...a); if(mx<1e-9) return 0;
    let num=0,den=0;
    for(let i=0;i<a.length;i++) if(a[i]>=mx*0.9){ num+=i*a[i]; den+=a[i]; }
    return den? (num/den)*fs : 0; };
  const climaxGap=Math.abs(peakTime(showEnv)-peakTime(musEnv));
  const climax=Math.max(0,1-climaxGap/12);              // within 12s of the music's peak

  const total=Math.round(100*(0.40*f1 + 0.35*track + 0.15*dynamics + 0.10*climax));

  /* --- actionable notes --- */
  const tips=[];
  const missed=strong.filter(a=>nearest(a.t,bursts)>TOL).sort((a,b)=>b.s-a.s).slice(0,3);
  if(recall<0.6 && missed.length)
    tips.push(`Big hits with no firework: ${missed.map(a=>fmtClock(a.t+t0)).join(', ')}`);
  if(precision<0.5 && bursts.length)
    tips.push(`${Math.round((1-precision)*100)}% of your bursts don't land on a beat — nudge them, or turn Snap off and fine-tune.`);
  if(track<0.25)
    tips.push('Your firework density barely follows the music — try thinning the quiet parts and crowding the loud ones.');
  if(cvShow<cvMus*0.5)
    tips.push('The show is too even. The music has peaks and valleys; the fireworks should too.');
  if(climax<0.5)
    tips.push(`Your busiest moment is ${climaxGap.toFixed(0)}s away from the music's peak at ${fmtClock(peakTime(musEnv)+t0)}.`);
  if(!tips.length) tips.push('Nicely matched — bursts land on the hits and the density follows the music.');

  const verdict = total>=80?'Tightly synced' : total>=65?'Good match' : total>=45?'Loosely synced' : 'Out of step';
  return {total,verdict,f1,precision,recall,track,dynamics,climax,
          nBursts:bursts.length,nAccents:accents.length,tips};
}

  const d=audioPlayer.dur;
  timeline.duration=Math.max(60,Math.ceil(d+20));            // 10s padding on each side
  timeline.events.push({id:nextId(),kind:'song',t0:10,t1:10+d,name:songName});
  timeline.zoom=Math.max(3,(window.innerWidth-40)/timeline.duration);   // fit the whole show on screen
  tlOpen();
}
window.addEventListener('resize',()=>{ if(!tlPanel.classList.contains('collapsed')){ tlResize(); tlDraw(); } });
relayout();

/* ---------------- mobile UI ---------------- */
const isTouch = matchMedia('(hover: none)').matches || 'ontouchstart' in window;
const isNarrow = () => window.innerWidth<=820;
const tabbar=document.getElementById('tabbar');
function setTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.tab===name));
  document.querySelectorAll('.tp').forEach(p=>p.classList.toggle('on',!isNarrow()||p.dataset.tab===name));
}
tabbar.addEventListener('click',e=>{ const t=e.target.closest('.tab'); if(t) setTab(t.dataset.tab); });
function applyLayout(){
  if(isNarrow()){ const cur=document.querySelector('.tab.on'); setTab(cur?cur.dataset.tab:'shell'); }
  else document.querySelectorAll('.tp').forEach(p=>p.classList.add('on'));   // desktop: show every panel inline
}
window.addEventListener('resize',applyLayout);
applyLayout();
if(isNarrow()) tlPanel.classList.add('collapsed');       // start with the sky, not the tools

/* drag the dock down to reclaim the sky (touch: drag the quick bar; desktop: right-drag anywhere) */
const qbar=document.querySelector('.qbar');
qbar.style.touchAction='none';
qbar.addEventListener('pointerdown',e=>{
  if(e.target.closest('button')||e.target.closest('.swatches')) return;      // don't hijack controls
  dockDragY=e.clientY; dockDragStart=dockShift; qbar.setPointerCapture(e.pointerId);
});
qbar.addEventListener('pointerup',()=>{ dockDragY=null; });

/* pinch to zoom the timeline on touch */
let pinch=null;
tlScroll.addEventListener('touchstart',e=>{ if(e.touches.length===2){
  const [a,b]=e.touches, d=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);
  pinch={d,zoom:timeline.zoom}; } },{passive:true});
tlScroll.addEventListener('touchmove',e=>{ if(pinch&&e.touches.length===2){ e.preventDefault();
  const [a,b]=e.touches, d=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);
  timeline.zoom=Math.max(3,Math.min(600,pinch.zoom*(d/pinch.d)));
  tlResize(); tlCanvas.style.left=tlScroll.scrollLeft+'px'; tlDraw(); } },{passive:false});
tlScroll.addEventListener('touchend',()=>{ pinch=null; });

/* ---------------- PWA ---------------- */
const ICON=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" fill="#0a0c18"/><g stroke-linecap="round"><g stroke="#ffb347" stroke-width="14">${
  Array.from({length:12},(_,i)=>{const a=i*Math.PI/6;return `<line x1="256" y1="256" x2="${256+Math.cos(a)*150}" y2="${256+Math.sin(a)*150}"/>`;}).join('')
}</g><g fill="#ff5a2c">${
  Array.from({length:12},(_,i)=>{const a=i*Math.PI/6+Math.PI/12;return `<circle cx="${256+Math.cos(a)*120}" cy="${256+Math.sin(a)*120}" r="13"/>`;}).join('')
}</g><circle cx="256" cy="256" r="30" fill="#ffd68a"/></svg>`;
const iconURL='data:image/svg+xml,'+encodeURIComponent(ICON);
const MANIFEST={name:'Kablammo',short_name:'Kablammo',start_url:'.',scope:'.',
  display:'fullscreen',orientation:'any',background_color:'#01010a',theme_color:'#161311',
  description:'Design and perform a fireworks show in your browser.',
  icons:[{src:iconURL,sizes:'any',type:'image/svg+xml',purpose:'any maskable'}]};
try{
  const mlink=document.createElement('link'); mlink.rel='manifest';
  mlink.href=URL.createObjectURL(new Blob([JSON.stringify(MANIFEST)],{type:'application/manifest+json'}));
  document.head.appendChild(mlink);
  const ilink=document.createElement('link'); ilink.rel='apple-touch-icon'; ilink.href=iconURL; document.head.appendChild(ilink);
}catch(e){ console.warn('manifest link failed',e); }

/* offline cache. Needs same-origin hosting (https or localhost) — no-ops in a sandboxed preview. */
if('serviceWorker' in navigator && location.protocol!=='blob:'){
  const SW=`const C='fwk-v1';
self.addEventListener('install',e=>{self.skipWaiting();
  e.waitUntil(caches.open(C).then(c=>c.addAll(['./','./index.html']).catch(()=>{})));});
self.addEventListener('activate',e=>{e.waitUntil(self.clients.claim());});
self.addEventListener('fetch',e=>{ if(e.request.method!=='GET') return;
  e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
    const cp=res.clone(); caches.open(C).then(c=>c.put(e.request,cp).catch(()=>{})); return res;
  }).catch(()=>caches.match('./'))));});`;
  try{
    const swURL=URL.createObjectURL(new Blob([SW],{type:'text/javascript'}));
    navigator.serviceWorker.register(swURL,{scope:'./'})
      .catch(()=>navigator.serviceWorker.register('./sw.js',{scope:'./'}).catch(()=>{}));
  }catch(e){ /* sandboxed: offline mode simply unavailable */ }
}

let deferredPrompt=null;
const installBtn=document.getElementById('installBtn');
window.addEventListener('beforeinstallprompt',e=>{ e.preventDefault(); deferredPrompt=e; installBtn.hidden=false; });
installBtn.onclick=async()=>{ if(!deferredPrompt) return; deferredPrompt.prompt();
  await deferredPrompt.userChoice; deferredPrompt=null; installBtn.hidden=true; };
window.addEventListener('appinstalled',()=>{ installBtn.hidden=true; deferredPrompt=null; });

window.addEventListener('resize',resize); resize(); requestAnimationFrame(frame);
setTimeout(()=>{ const s=curShell,c=curColor; curColor='gold'; launch(W*0.5,horizonY*0.32); curShell=s; curColor=c; },700);
</script>
