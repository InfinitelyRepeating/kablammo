<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#161311">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kablammo">
<meta name="description" content="Kablammo — design and perform a fireworks show in your browser.">
<title>Kablammo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --panel:#161311; --panel-hi:#211c18; --edge:#332a22;
    --amber:#ffb347; --amber-dim:#a9741f; --phosphor:#ffd68a; --ember:#ff5a2c;
    --mono:"Space Mono",ui-monospace,"Courier New",monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:#01010a;font-family:var(--mono);
    overscroll-behavior:none;touch-action:manipulation;}
  #stage{position:fixed;inset:0;cursor:crosshair;touch-action:none;}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
  #vignette{position:fixed;inset:0;pointer-events:none;box-shadow:inset 0 0 240px 40px rgba(0,0,0,.75);z-index:2;}

  #wordmark{position:fixed;left:0;right:0;top:7%;z-index:3;pointer-events:none;text-align:center;
    font-family:var(--mono);font-weight:700;font-size:clamp(1.6rem,7vw,3.4rem);letter-spacing:.34em;
    color:var(--amber);text-indent:.34em;
    text-shadow:0 0 28px rgba(255,150,60,.55),0 0 70px rgba(255,90,40,.30);
    transition:opacity .8s ease;}
  #wordmark.hide{opacity:0;}
  #hint{position:fixed;left:0;right:0;top:12%;z-index:3;pointer-events:none;text-align:center;
    color:rgba(255,214,138,.5);font-size:.66rem;letter-spacing:.24em;text-transform:uppercase;transition:opacity .8s ease;}
  #hint.hide{opacity:0;}

  #console{position:fixed;left:0;right:0;bottom:0;z-index:4;
    background:linear-gradient(180deg,var(--panel-hi),var(--panel));border-top:1px solid var(--edge);
    box-shadow:0 -14px 40px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,180,90,.06);
    padding:13px 14px calc(11px + env(safe-area-inset-bottom));display:flex;flex-wrap:wrap;align-items:center;gap:9px 15px;}
  #console::before{content:none;}
  .ctitle{font-size:.55rem;letter-spacing:.2em;color:var(--amber-dim);white-space:nowrap;}
  .sel{font-family:var(--mono);font-size:.62rem;color:var(--phosphor);background:#0f0c0a;
    border:1px solid var(--edge);border-radius:5px;padding:6px 6px;outline:none;cursor:pointer;max-width:38vw;}
  .sel:focus{border-color:var(--amber);}
  .group{display:flex;align-items:center;gap:8px;}
  .lbl{font-size:.54rem;letter-spacing:.15em;color:var(--amber-dim);text-transform:uppercase;white-space:nowrap;}
  .div{width:1px;height:26px;background:var(--edge);}
  .swatches{display:flex;gap:6px;}
  .sw{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;
    transition:transform .12s ease,border-color .12s ease;box-shadow:0 0 8px currentColor;}
  .sw:hover{transform:scale(1.15);} .sw.on{border-color:#fff;transform:scale(1.15);}

  .sld{display:flex;flex-direction:column;align-items:center;gap:1px;flex:1 1 0;min-width:0;}
  .sld span{font-size:.5rem;letter-spacing:.09em;color:var(--amber-dim);text-transform:uppercase;
    width:auto;text-align:center;line-height:1.1;white-space:nowrap;}
  .sld input[type=range]{width:100%;}
  input[type=range]{-webkit-appearance:none;appearance:none;width:62px;height:3px;border-radius:3px;
    background:#3a2f22;outline:none;cursor:pointer;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;
    background:var(--amber);box-shadow:0 0 6px rgba(255,150,60,.6);cursor:pointer;}
  input[type=range]::-moz-range-thumb{width:12px;height:12px;border:none;border-radius:50%;
    background:var(--amber);box-shadow:0 0 6px rgba(255,150,60,.6);cursor:pointer;}

  #msgInput{font-family:var(--mono);font-size:.72rem;color:var(--phosphor);background:#0f0c0a;
    border:1px solid var(--edge);border-radius:5px;padding:8px 10px;width:150px;max-width:44vw;outline:none;transition:border-color .14s ease;}
  #msgInput:focus{border-color:var(--amber);} #msgInput::placeholder{color:#6b5535;}
  .btn{font-family:var(--mono);font-weight:700;font-size:.64rem;letter-spacing:.07em;text-transform:uppercase;
    padding:9px 12px;border-radius:6px;cursor:pointer;border:1px solid var(--edge);color:var(--phosphor);
    background:#0f0c0a;transition:all .14s ease;user-select:none;white-space:nowrap;}
  #corners.on{color:#7dffc4;border-color:#4fd39a;box-shadow:0 0 12px rgba(60,220,150,.35);}
  #finale{color:#fff;border-color:var(--ember);background:linear-gradient(180deg,#ff6a3a,#d63c14);box-shadow:0 0 16px rgba(255,80,40,.45);}
  #finale:hover{filter:brightness(1.12);} #finale:active{transform:translateY(1px);}
  #rapid.on{color:#ffd68a;border-color:var(--amber);box-shadow:0 0 14px rgba(255,150,60,.5);
    background:linear-gradient(180deg,#3a2410,#241608);}
  #mute.off{color:#6b5535;}
  #song{font-family:var(--mono);font-size:.62rem;color:var(--phosphor);background:#0f0c0a;border:1px solid var(--edge);
    border-radius:5px;padding:7px 6px;outline:none;cursor:pointer;max-width:44vw;}
  #playBtn.on{color:#7dffc4;border-color:#4fd39a;box-shadow:0 0 12px rgba(60,220,150,.35);}
  .filebtn{position:relative;} .filebtn input{display:none;}
  .filebtn.on{color:#7dffc4;border-color:#4fd39a;box-shadow:0 0 12px rgba(60,220,150,.35);}
  #openBuilder.on{color:#a9ccff;border-color:#5aa0ff;box-shadow:0 0 12px rgba(70,140,255,.35);}
  #trackSel.on{border-color:var(--amber);color:var(--amber);box-shadow:0 0 10px rgba(255,150,60,.35);}
  #dock{position:fixed;left:0;right:0;bottom:0;z-index:4;display:flex;flex-direction:column;
    -webkit-touch-callout:none;-webkit-user-select:none;user-select:none;}
  #console{position:static;left:auto;right:auto;bottom:auto;z-index:auto;
    flex-direction:column;align-items:stretch;}

  #tlPanel{background:linear-gradient(180deg,#1b1714,#141110);border-top:1px solid var(--edge);
    box-shadow:0 -10px 30px rgba(0,0,0,.4);}
  #tlPanel.collapsed #tlScroll{display:none;}
  .tlbar{display:flex;align-items:center;gap:7px;padding:7px 12px;flex-wrap:wrap;}
  .tlbar .btn{padding:6px 9px;font-size:.6rem;}
  #tlSnap.on,#tlMin.on{color:#a9ccff;border-color:#5aa0ff;box-shadow:0 0 10px rgba(70,140,255,.3);}
  #tlRec.on{color:#fff;border-color:#ff4242;background:linear-gradient(180deg,#e0402c,#a2160c);
    box-shadow:0 0 16px rgba(255,60,40,.6);}
  #tlPlay.on{color:#7dffc4;border-color:#4fd39a;box-shadow:0 0 12px rgba(60,220,150,.35);}
  #tlScroll{overflow-x:auto;overflow-y:auto;position:relative;background:#0c0a09;
    max-height:38vh;
    border-top:1px solid var(--edge);}
  #tlInner{position:relative;}
  #tlCanvas{position:absolute;top:0;left:0;display:block;touch-action:none;}

  #tlMenu,#tlFileMenu,#tlEdit{position:fixed;z-index:30;color:var(--phosphor);
    background:linear-gradient(180deg,#211c18,#161311);border:1px solid var(--edge);border-radius:8px;
    box-shadow:0 12px 40px rgba(0,0,0,.6);padding:8px;display:none;min-width:200px;max-width:min(320px,92vw);}
  #tlMenu.on,#tlFileMenu.on,#tlEdit.on{display:block;}
  #tlEdit{max-height:70vh;overflow-y:auto;min-width:250px;max-width:min(340px,94vw);}
  .mi{padding:8px 10px;font-size:.66rem;border-radius:5px;cursor:pointer;letter-spacing:.05em;}
  .mi:hover{background:#2a2018;color:var(--amber);}
  .mi.dis{opacity:.32;cursor:not-allowed;}
  .mi.dis:hover{background:none;color:var(--phosphor);}
  .erow{display:flex;align-items:center;gap:6px;margin:7px 0;flex-wrap:wrap;}
  .erow .blbl{width:52px;}
  .erow input[type=range]{width:96px;}
  .etitle{font-size:.6rem;letter-spacing:.2em;color:var(--amber);padding:2px 2px 8px;}
  .num{font-family:var(--mono);font-size:.62rem;color:var(--phosphor);background:#0f0c0a;
    border:1px solid var(--edge);border-radius:5px;padding:5px 6px;width:74px;outline:none;}
  #eDel{color:#ff9a80;border-color:#7a2a1a;}


  .qbar{display:flex;align-items:center;gap:8px;width:100%;}
  .tabbar{display:none;gap:4px;width:100%;margin-top:8px;}
  .tab{flex:1;font-family:var(--mono);font-size:.6rem;letter-spacing:.06em;text-transform:uppercase;
    color:var(--amber-dim);background:#0f0c0a;border:1px solid var(--edge);border-radius:6px;
    padding:9px 4px;cursor:pointer;}
  .tab.on{color:var(--amber);border-color:var(--amber);background:linear-gradient(180deg,#3a2410,#241608);}
  .panels{display:flex;align-items:center;gap:10px 16px;flex-wrap:wrap;width:100%;}
  .tp{display:flex;align-items:center;gap:10px 16px;flex-wrap:wrap;}
  .tp:not(.on){display:none;}

  #dock input[type=text],#dock input[type=number]{-webkit-user-select:text;user-select:text;}
  .sel.narrow{flex:0 0 auto;width:auto;min-width:0;}
  .sldrow{gap:10px;align-items:flex-end;}
  .padwrap{margin:6px 0 2px;}
  .pad{background:#05060f;border:1px solid var(--edge);border-radius:5px;
    max-width:100%;max-height:44vh;width:auto;height:auto;margin:0 auto;
    touch-action:none;cursor:crosshair;display:block;}
  .padcap{font-size:.55rem;letter-spacing:.06em;color:var(--amber-dim);text-align:center;margin-top:5px;line-height:1.4;}
  #posOverlay{position:fixed;inset:0;z-index:35;background:rgba(2,2,8,.72);
    display:none;align-items:center;justify-content:center;}
  #posOverlay.on{display:flex;}
  #posDlg{width:min(380px,94vw);display:flex;flex-direction:column;color:var(--phosphor);
    background:linear-gradient(180deg,#211c18,#161311);border:1px solid var(--edge);border-radius:12px;
    box-shadow:0 20px 60px rgba(0,0,0,.6);overflow:hidden;}
  .posbody{padding:14px;}
  #posDone{color:#fff;border-color:var(--ember);background:linear-gradient(180deg,#ff6a3a,#d63c14);
    box-shadow:0 0 14px rgba(255,80,40,.4);}
  #scoreOverlay{position:fixed;inset:0;z-index:36;background:rgba(2,2,8,.72);
    display:none;align-items:center;justify-content:center;}
  #scoreOverlay.on{display:flex;}
  #scoreDlg{width:min(400px,94vw);max-height:88vh;overflow-y:auto;display:flex;flex-direction:column;
    color:var(--phosphor);background:linear-gradient(180deg,#211c18,#161311);
    border:1px solid var(--edge);border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.6);}
  .sbody{padding:14px;}
  .sbig{text-align:center;font-size:3.2rem;line-height:1;color:var(--amber);
    text-shadow:0 0 26px rgba(255,150,60,.45);}
  .sverdict{text-align:center;font-size:.66rem;letter-spacing:.24em;text-transform:uppercase;
    color:var(--phosphor);margin:6px 0 14px;}
  .smetric{margin:9px 0;}
  .smlabel{display:flex;justify-content:space-between;font-size:.6rem;color:var(--amber-dim);
    letter-spacing:.06em;margin-bottom:3px;}
  .smlabel b{color:var(--phosphor);font-weight:400;}
  .smbar{height:6px;border-radius:3px;background:#0f0c0a;border:1px solid var(--edge);overflow:hidden;}
  .smfill{height:100%;background:linear-gradient(90deg,#d63c14,#ffb347);}
  .stips{margin-top:14px;border-top:1px solid var(--edge);padding-top:10px;}
  .stip{font-size:.62rem;line-height:1.5;color:var(--phosphor);margin:6px 0;padding-left:14px;position:relative;}
  .stip::before{content:"›";position:absolute;left:2px;color:var(--amber);}
  .spacer{flex:1 1 auto;}

  #builderOverlay{position:fixed;inset:0;z-index:20;background:rgba(2,2,8,.72);
    display:none;align-items:center;justify-content:center;}
  #builderOverlay.on{display:flex;}
  #builder{width:50vw;min-width:300px;max-width:640px;height:auto;max-height:calc(100vh - 72px);
    display:flex;flex-direction:column;overflow:hidden;color:var(--phosphor);
    background:linear-gradient(180deg,#211c18,#161311);border:1px solid var(--edge);border-radius:12px;
    box-shadow:0 20px 60px rgba(0,0,0,.6);}
  .bhead{font-size:.66rem;letter-spacing:.22em;color:var(--amber);padding:11px 14px;border-bottom:1px solid var(--edge);
    display:flex;align-items:center;justify-content:space-between;gap:8px;flex:0 0 auto;}
  .bbody{display:flex;flex-direction:column;align-items:center;gap:10px;padding:12px 14px;overflow-y:auto;flex:1 1 auto;min-height:0;}
  .btoolbar{display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap;width:100%;}
  .bstage{position:relative;width:100%;height:min(300px,38vh);min-height:180px;
    margin:6px 0;flex:0 0 auto;overflow:hidden;}
  #bcanvas{position:absolute;inset:0;width:100%;height:100%;display:block;
    background:transparent;border:0;touch-action:none;cursor:crosshair;}
  #cutList{display:flex;flex-direction:column;gap:5px;align-items:center;width:100%;}
  #dBi.on{color:#a9ccff;border-color:#5aa0ff;box-shadow:0 0 10px rgba(70,140,255,.3);}
  .bcontrols{flex:1 1 200px;display:flex;flex-direction:column;gap:9px;min-width:190px;}
  .brow{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .blbl{font-size:.55rem;letter-spacing:.12em;color:var(--amber-dim);text-transform:uppercase;width:42px;}
  .bnote{font-size:.55rem;color:#6b5535;letter-spacing:.04em;}
  #bBase{font-family:var(--mono);font-size:.62rem;color:var(--phosphor);background:#0f0c0a;border:1px solid var(--edge);border-radius:5px;padding:5px 6px;}
  .bhead .btn{padding:5px 8px;font-size:.55rem;}
  #layerTag{font-size:.55rem;color:var(--amber-dim);letter-spacing:.1em;}
  .cutrow input[type=range]{width:78px;}
  .bcontrols input[type=range]{width:74px;}
  .bfoot{display:flex;justify-content:flex-end;gap:8px;padding:10px 14px;border-top:1px solid var(--edge);flex:0 0 auto;}
  #bUse{color:#fff;border-color:var(--ember);background:linear-gradient(180deg,#ff6a3a,#d63c14);box-shadow:0 0 16px rgba(255,80,40,.4);}

  #console{max-height:42vh;overflow-y:auto;overflow-x:hidden;}
  #minBtn{order:-1;font-family:var(--mono);font-size:.62rem;
    color:var(--amber-dim);background:#0f0c0a;border:1px solid var(--edge);border-radius:5px;
    padding:6px 9px;cursor:pointer;line-height:1;}
  #minBtn:hover{color:var(--amber);border-color:var(--amber-dim);}
  #console.min{max-height:none;overflow:visible;padding:7px 14px calc(7px + env(safe-area-inset-bottom));}
  #console.min .tabbar,#console.min .panels{display:none;}

  /* ---- mobile overrides (last in the cascade so they win) ---- */
  @media (max-width:820px){
    #console{gap:0;padding:6px 8px calc(6px + env(safe-area-inset-bottom));max-height:46vh;}
    .tabbar{display:flex;gap:3px;margin-top:6px;}
    .tab{padding:7px 2px;font-size:.55rem;}
    .panels{margin-top:6px;}
    .tp{width:100%;gap:6px 8px;}
    .tp .group{width:100%;flex-wrap:nowrap;gap:6px;}
    .lbl{display:none;}
    .div{display:none;}
    .btn,.sel{padding:9px 10px;font-size:.66rem;}          /* finger-sized but compact */
    .sel{flex:1 1 auto;min-width:0;max-width:none;}
    .sel.narrow{flex:0 1 auto;max-width:34%;padding:9px 4px;font-size:.62rem;}
    #openBuilder{flex:0 0 auto;padding:9px 8px;}
    #msgInput{flex:1 1 100%;max-width:none;padding:9px 10px;font-size:.78rem;}
    .sw{width:24px;height:24px;}
    .sld{flex:1 1 0;min-width:0;gap:3px;}                  /* R/T/P share one row */
    .sld span{width:8px;font-size:.55rem;}
    input[type=range]{width:100%;height:20px;}
    input[type=range]::-webkit-slider-thumb{width:17px;height:17px;}
    input[type=range]::-moz-range-thumb{width:17px;height:17px;}
    .ctitle{display:none;}
    .qbar{gap:5px;}
    .tlbar{gap:4px;padding:5px 7px;flex-wrap:nowrap;overflow-x:auto;}
    .tlbar .btn{padding:7px 8px;font-size:.62rem;flex:0 0 auto;}
    .tlbar .bnote{font-size:.55rem;flex:0 0 auto;}
    #builder{width:94vw;min-width:0;max-height:calc(100vh - 40px);}
    .bstage{height:min(300px,34vh);min-height:170px;}
    .btoolbar{gap:5px;}
    #tlMenu,#tlEdit{max-width:94vw;}
    .mi{padding:12px 10px;font-size:.72rem;}
    .erow input[type=range]{width:100%;flex:1;}
  }
  @media (max-width:820px) and (orientation:landscape){
    #console{max-height:60vh;}
    .bstage{height:min(220px,44vh);min-height:150px;}
  }
</style>
</head>
<body>
  <div id="stage"><canvas id="bg"></canvas><canvas id="fx"></canvas></div>
  <div id="vignette"></div>

  <div id="builderOverlay">
    <div id="builder">
      <div class="bhead">
        <span>◈ SHELL BUILDER</span>
        <span class="brow" style="gap:6px">
          <span id="layerTag">LAYER 1/1</span>
          <button class="btn" id="addLayer">+</button>
          <button class="btn" id="switchLayer">⇄ Switch</button>
          <button class="btn" id="delLayer">Delete Other</button>
        </span>
      </div>
      <div class="bbody">
        <div class="btoolbar">
          <select class="sel" id="bBase">
            <option value="peony">Peony</option><option value="chrys">Chrys</option>
            <option value="star">Star</option><option value="heart">Heart</option>
            <option value="ring">Ring</option><option value="willow">Willow</option>
            <option value="palm">Palm</option>
          </select>
          <button class="btn" id="addSlice">+ Slice</button>
          <button class="btn" id="addRing">+ Ring</button>
          <button class="btn" id="dBi">Both Ways</button>
          <button class="btn" id="dReset">Remove Deform</button>
        </div>
        <div class="btoolbar">
          <span class="blbl">Shape</span>
          <label class="sld" title="Burst radius"><input id="bRadius" type="range" min="0.5" max="1.8" step="0.05"><span>Radius</span></label>
          <label class="sld" title="Trail length"><input id="bTrails" type="range" min="0" max="1" step="0.05"><span>Trails</span></label>
          <label class="sld" title="How long sparks live"><input id="bPersist" type="range" min="0.6" max="2" step="0.05"><span>Persist</span></label>
        </div>
        <div class="btoolbar"><span class="blbl">Paint</span><div class="swatches" id="bColors"></div></div>
        <div class="bstage"><canvas id="bcanvas"></canvas></div>
        <div id="cutList"></div>
        <div class="bnote">Click a region to paint · drag a slice or ring to adjust · drag the orange handle to deform</div>
      </div>
      <div class="bfoot">
        <button class="btn" id="bReset">Reset</button>
        <button class="btn" id="bUse">Use Shell</button>
      </div>
    </div>
  </div>
  <div id="wordmark">KABLAMMO</div>
  <div id="hint">Tap high for aerial shells &nbsp;·&nbsp; low for ground effects</div>

  <div id="dock">
  <div id="tlPanel" class="collapsed">
    <div class="tlbar">
      <button class="btn" id="tlMin" title="Show timeline">▴</button>
      <button class="btn" id="tlPlay" title="Play show">▶</button>
      <button class="btn" id="tlRec" title="Record">●</button>
      <button class="btn" id="tlAdd" title="Add an event">✚ Event</button>
      <button class="btn on" id="tlSnap" title="Snap to ¼ second">¼s</button>
      <button class="btn" id="tlScore" title="Score how well the show matches the music">◎ Sync</button>
      <span class="spacer"></span>
      <span class="bnote" id="tlClock">0:00.0</span>
      <span class="lbl">Length</span>
      <button class="btn" id="tlMinus" title="Shorten show by 10s">−10s</button>
      <span class="bnote" id="tlLen">5:00</span>
      <button class="btn" id="tlPlus" title="Lengthen show by 10s">+10s</button>
      <button class="btn" id="tlFile" title="Save, load or clear the show">📁</button>
    </div>
    <div id="tlScroll"><div id="tlInner"><canvas id="tlCanvas"></canvas></div></div>
  </div>

  <div id="console">
    <div class="qbar">
      <button id="minBtn" title="Minimize console">▾</button>
      <span class="ctitle">◈ KABLAMMO</span>
      <div class="swatches" id="colors"></div>
      <span class="spacer"></span>
      <button class="btn" id="rapid">⚡</button>
      <button class="btn" id="finale">◈</button>
      <button class="btn" id="mute">♪</button>
    </div>
    <div class="tabbar" id="tabbar">
      <button class="tab on" data-tab="shell">Shell</button>
      <button class="tab" data-tab="ground">Ground</button>
      <button class="tab" data-tab="scene">Scene</button>
      <button class="tab" data-tab="music">Music</button>
      <button class="tab" data-tab="text">Text</button>
    </div>
    <div class="panels">
      <div class="tp on" data-tab="shell">
        <div class="group">
          <span class="lbl">Shell</span>
          <select class="sel narrow" id="shellSel">

<script>
/* ============================================================
   KABLAMMO — a fireworks show designer
   - shaped shells with organic drift
   - serpent w/ sparkle tail; + Roman candle & Catherine wheel
   - dot-matrix LED marquee near the waterline
   - per-shell sliders: radius / trails / persistence
   - color handled via PALETTES so multi-color-per-shell drops
     in later without touching shell geometry
   ============================================================ */
const bg=document.getElementById('bg'), fx=document.getElementById('fx');
let bgx=bg.getContext('2d'); const ctx=fx.getContext('2d');
let W=0,H=0,DPR=1,horizonY=0,dtGlobal=1;
let stars=[], skyGrad=null, curScene='city', sceneData=null, fgCache=null;

const COLORS={red:[255,66,66],gold:[255,190,74],green:[86,255,128],
  blue:[96,172,255],purple:[200,112,255],silver:[222,232,255],multi:null};
const COLOR_ORDER=['red','gold','green','blue','purple','silver','multi'];
let curShell='peony', curColor='gold', curGround='fountain', cornersOn=false;

/* per-shell tunables (radius = burst size, trails = ember amount, persist = lifetime) */
/* defaults: radius mid-slider (50%), trails & persist low (10%).
   These are live values — user edits are remembered per shell type for the session. */
const DEF_R=0.89, DEF_T=0.10, DEF_P=0.74;      // 30% / 10% / 10% of their slider ranges
const shellParams={
  peony:{radius:DEF_R,trails:DEF_T,persist:DEF_P},
  chrys:{radius:DEF_R,trails:DEF_T,persist:DEF_P},
  star:{radius:DEF_R,trails:DEF_T,persist:DEF_P},
  heart:{radius:DEF_R,trails:DEF_T,persist:DEF_P},
  willow:{radius:DEF_R,trails:DEF_T,persist:DEF_P},
  palm:{radius:DEF_R,trails:DEF_T,persist:DEF_P},
  ring:{radius:DEF_R,trails:DEF_T,persist:DEF_P},
  custom:{radius:1.0,trails:1.0,persist:1.0}    // multipliers over each builder layer's own RTP
};

/* ---- COLOR AS PALETTE (future-proofing for multi-color shells) ----
   Today each shell resolves to a 1-color palette (or 'multi' random).
   Later a shell can be handed [c1,c2,...] plus a distribution rule
   (by index, by ring, by radius) with zero change to the geometry. */
/* ---- show design-space ----
   Positions are authored in a fixed 16:9 frame and contain-fitted into whatever sky
   the device has. Same composition on a phone, a laptop, or an ultrawide. */
const SHOW_ASPECT=16/9;
function showRect(){
  const sw=W, sh=horizonY;
  let w=sw, h=sw/SHOW_ASPECT;
  if(h>sh){ h=sh; w=sh*SHOW_ASPECT; }        // contain-fit
  return {x:(sw-w)/2, y:(sh-h)/2, w, h};
}
const showX=fx=>{ const r=showRect(); return r.x+fx*r.w; };
const showY=fy=>{ const r=showRect(); return r.y+fy*r.h; };
const unShowX=px=>{ const r=showRect(); return (px-r.x)/r.w; };   // screen -> design-space
const unShowY=py=>{ const r=showRect(); return (py-r.y)/r.h; };

function paletteFor(name){ return name==='multi' ? null : [COLORS[name]||COLORS.gold]; }
function copyCustom(cs){ return cs ? {shells:cs.shells.map(s=>({base:s.base,cuts:s.cuts.map(c=>({...c})),
  regions:{...s.regions},deform:{...s.deform},rtp:{...s.rtp}}))} : null; }

/* ---- sequencer state (declared early: launch/groundShot record into it) ---- */
const timeline={duration:300, events:[], snap:true, zoom:40};
let recording=false, recT0=0, recOffset=0, uid=1;
const nextId=()=>uid++;
function recNow(){ return (performance.now()-recT0)/1000; }
function randColor(){ return COLORS[COLOR_ORDER[(Math.random()*6)|0]]; }
function palColor(pal,i){ return pal ? pal[i%pal.length] : randColor(); }

/* ---------------- scene ---------------- */
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2); W=window.innerWidth; H=window.innerHeight;
  for(const c of [bg,fx]){ c.width=W*DPR; c.height=H*DPR; c.getContext('2d').setTransform(DPR,0,0,DPR,0,0); }
  horizonY=H*0.74;
  ledDot=Math.max(2,Math.min(3.5,W/280));
  ledVisCols=Math.min(140,Math.floor(W*0.82/ledDot));
  if(msgText) ledCols=buildLED(msgText);
  buildScene();
}
function buildScene(){
  skyGrad=bgx.createLinearGradient(0,0,0,horizonY);
  skyGrad.addColorStop(0,'#05061a'); skyGrad.addColorStop(0.55,'#0a0c24'); skyGrad.addColorStop(1,'#161535');
  stars=[]; const n=Math.floor(W*horizonY/5200);
  for(let i=0;i<n;i++) stars.push({x:Math.random()*W,y:Math.random()*horizonY*0.92,r:Math.random()*1.2+0.2,
    base:Math.random()*0.5+0.25,spd:Math.random()*2+0.5,ph:Math.random()*6.28});
  sceneData=SCENES[curScene].build();
  renderSceneCache();
}
/* The water, scene silhouettes, and their reflection are static between resizes/scene changes,
   so they render ONCE into an offscreen canvas. Per frame they cost a single drawImage blit
   instead of hundreds of fills — the main battery saving on phones. */
function renderSceneCache(){
  if(!fgCache) fgCache=document.createElement('canvas');
  fgCache.width=bg.width; fgCache.height=bg.height;
  const real=bgx;
  bgx=fgCache.getContext('2d'); bgx.setTransform(DPR,0,0,DPR,0,0);
  const wg=bgx.createLinearGradient(0,horizonY,0,H);
  wg.addColorStop(0,'#141330'); wg.addColorStop(1,'#040414');
  bgx.fillStyle=wg; bgx.fillRect(0,horizonY,W,H-horizonY);
  drawForeground(false); drawForeground(true);
  bgx=real;
}
function drawScene(t){
  bgx.fillStyle=skyGrad; bgx.fillRect(0,0,W,horizonY);
  bgx.fillStyle='#fff7e8';                                   // stars: tiny rects, not paths — same look, far cheaper
  for(const s of stars){ const a=s.base+Math.sin(t*0.001*s.spd+s.ph)*0.25;
    if(a>0){ bgx.globalAlpha=a; bgx.fillRect(s.x-s.r,s.y-s.r,s.r*2,s.r*2); } }
  bgx.globalAlpha=1;
  bgx.setTransform(1,0,0,1,0,0); bgx.drawImage(fgCache,0,0); bgx.setTransform(DPR,0,0,DPR,0,0);
  bgx.strokeStyle='rgba(150,170,255,0.10)'; bgx.lineWidth=1;
  for(let i=0;i<4;i++){ const yy=horizonY+6+i*10; bgx.beginPath();
    for(let xx=0;xx<=W;xx+=16){ const off=Math.sin(xx*0.03+t*0.0012+i)*1.6; xx===0?bgx.moveTo(xx,yy+off):bgx.lineTo(xx,yy+off);} bgx.stroke(); }
  drawLEDSign(t);
}
/* ---------------- backdrops (dark silhouette scenes) ---------------- */
const SIL_NEAR='#05060f', SIL_MID='#080b18', SIL_FAR='#0d1122', SNOW='#252c47';
function drawForeground(reflect){
  bgx.save();
  if(reflect){ bgx.globalAlpha=0.18; bgx.translate(0,horizonY*2); bgx.scale(1,-1); }
  SCENES[curScene].draw(reflect,sceneData);
  bgx.restore();
}
const SCENES={
  /* zoomed-out city: two depth layers, smaller buildings, roof variety */
  city:{
    build(){
      const back=[],front=[]; let x=-20;
      while(x<W+40){ const w=Math.random()*22+14, h=Math.random()*horizonY*0.10+horizonY*0.035;
        back.push({x,w,top:horizonY-h}); x+=w+Math.random()*6+1; }
      x=-20;
      while(x<W+40){ const w=Math.random()*30+18, h=Math.random()*Math.random()*horizonY*0.20+horizonY*0.045;
        const b={x,w,top:horizonY-h,roof:(Math.random()*4)|0,antenna:Math.random()<0.22?Math.random()*16+6:0,windows:[]};
        const cols=Math.max(1,Math.floor(w/11)), rows=Math.max(1,Math.floor(h/14));
        for(let cx=0;cx<cols;cx++)for(let cy=0;cy<rows;cy++) if(Math.random()<0.20)
          b.windows.push({x:b.x+5+cx*11,y:b.top+6+cy*14,lit:Math.random()});
        front.push(b); x+=w+Math.random()*7+2; }
      return {back,front};
    },
    draw(reflect,d){
      bgx.fillStyle=reflect?'#0b0e28':SIL_FAR;                       // distant layer, atmospheric
      for(const b of d.back) bgx.fillRect(b.x,b.top,b.w,horizonY-b.top+2);
      bgx.fillStyle=reflect?'#080a20':SIL_NEAR;                      // near layer, darker
      for(const b of d.front){ bgx.fillRect(b.x,b.top,b.w,horizonY-b.top+2);
        if(b.roof===1) bgx.fillRect(b.x+b.w*0.22,b.top-5,b.w*0.56,5);          // setback
        else if(b.roof===2){ const tx=b.x+b.w*0.5; bgx.fillRect(tx-4,b.top-9,8,7); } // water tower
        if(b.antenna) bgx.fillRect(b.x+b.w/2-1,b.top-b.antenna,2,b.antenna); }
      if(!reflect){ for(const b of d.front) for(const wn of b.windows){
        bgx.globalAlpha=0.3+wn.lit*0.5; bgx.fillStyle=wn.lit>0.7?'#ffd27a':'#e8a94a'; bgx.fillRect(wn.x,wn.y,2.1,3); }
        bgx.globalAlpha=1; }
    }
  },
  /* New River Gorge: single steel deck-arch spanning a canyon */
  bridge:{
    build(){ const x0=W*0.06,x1=W*0.94,cx=(x0+x1)/2,half=(x1-x0)/2; return {x0,x1,cx,half}; },
    draw(reflect,d){
      const steel=reflect?'#141a30':'#2a3252', rim=horizonY*0.82, deckY=horizonY*0.60;
      bgx.fillStyle=reflect?'#101830':'#18203a';                     // canyon walls (brighter, lower)
      bgx.beginPath(); bgx.moveTo(0,horizonY); bgx.lineTo(0,rim*0.88);
        bgx.quadraticCurveTo(d.x0*0.6,rim*0.8,d.x0,rim); bgx.lineTo(d.x0,horizonY); bgx.closePath(); bgx.fill();
      bgx.beginPath(); bgx.moveTo(W,horizonY); bgx.lineTo(W,rim*0.9);
        bgx.quadraticCurveTo(W-(W-d.x1)*0.6,rim*0.82,d.x1,rim); bgx.lineTo(d.x1,horizonY); bgx.closePath(); bgx.fill();
      const archY=(x)=>{ const u=(x-d.cx)/d.half; return deckY+10+(rim-(deckY+10))*(u*u); };
      bgx.strokeStyle=steel; bgx.lineWidth=Math.max(3.5,horizonY*0.014);         // arch top chord
      bgx.beginPath(); for(let x=d.x0;x<=d.x1;x+=4){ const y=archY(x); x===d.x0?bgx.moveTo(x,y):bgx.lineTo(x,y);} bgx.stroke();
      bgx.lineWidth=Math.max(2,horizonY*0.008);                                  // lower chord
      bgx.beginPath(); for(let x=d.x0;x<=d.x1;x+=4){ const y=archY(x)+horizonY*0.022; x===d.x0?bgx.moveTo(x,y):bgx.lineTo(x,y);} bgx.stroke();
      bgx.lineWidth=1.2;                                                         // lattice
      for(let x=d.x0;x<=d.x1;x+=14){ const y=archY(x); bgx.beginPath(); bgx.moveTo(x,y); bgx.lineTo(x+7,y+horizonY*0.022); bgx.stroke(); }
      bgx.lineWidth=Math.max(1.6,horizonY*0.005);                               // spandrel columns
      for(let i=0;i<=18;i++){ const x=d.x0+(d.x1-d.x0)*i/18, ay=archY(x); if(ay>deckY+5){ bgx.beginPath(); bgx.moveTo(x,deckY); bgx.lineTo(x,ay); bgx.stroke(); } }
      bgx.fillStyle=steel; bgx.fillRect(0,deckY-Math.max(2,horizonY*0.006),W,Math.max(3,horizonY*0.013)); // deck
      if(!reflect){ bgx.fillStyle='#ffd9a0'; for(let x=W*0.1;x<W*0.9;x+=W*0.08){ bgx.globalAlpha=0.7; bgx.fillRect(x,deckY-horizonY*0.02,1.6,horizonY*0.014);} bgx.globalAlpha=1; }
    }
  },
  /* US Capitol: wings, central portico, tall ribbed dome + statue */
  capitol:{
    build(){
      const cx=W/2, baseW=Math.min(W*0.66,940), wingH=horizonY*0.12, wins=[];
      const x0=cx-baseW/2, x1=cx+baseW/2, wingsTop=horizonY-wingH;
      for(let r=0;r<2;r++) for(let wx=x0+10; wx<x1-6; wx+=15) if(Math.random()<0.7) wins.push({x:wx,y:wingsTop+7+r*15,lit:Math.random()});
      return {cx,baseW,wingH,x0,x1,wingsTop,wins};
    },
    draw(reflect,d){
      const near=reflect?'#0e1330':'#171e36'; bgx.fillStyle=near;
      const {cx,baseW,x0,x1,wingsTop,wingH}=d;
      bgx.fillRect(x0,wingsTop,baseW,wingH+2);                                   // wings
      const cw=baseW*0.30, cTop=horizonY-horizonY*0.185; bgx.fillRect(cx-cw/2,cTop,cw,horizonY-cTop+2); // central block
      bgx.beginPath(); bgx.moveTo(cx-cw/2,cTop); bgx.lineTo(cx,cTop-horizonY*0.032); bgx.lineTo(cx+cw/2,cTop); bgx.closePath(); bgx.fill(); // pediment
      const drumW=cw*0.60, drumTop=cTop-horizonY*0.07; bgx.fillRect(cx-drumW/2,drumTop,drumW,cTop-drumTop); // drum
      const domeR=drumW/2; bgx.beginPath(); bgx.ellipse(cx,drumTop,domeR,domeR*1.3,0,Math.PI,2*Math.PI); bgx.fill(); // dome
      const lanY=drumTop-domeR*1.3; bgx.fillRect(cx-domeR*0.16,lanY,domeR*0.32,horizonY*0.02);              // lantern
      bgx.fillRect(cx-1.5,lanY-horizonY*0.022,3,horizonY*0.022);                                            // Freedom statue
      if(!reflect){
        bgx.fillStyle='#ffe1a8'; for(const w of d.wins){ bgx.globalAlpha=0.35+w.lit*0.5; bgx.fillRect(w.x,w.y,2.2,4);} bgx.globalAlpha=1;
        bgx.fillStyle='rgba(0,0,0,0.45)'; for(let wx=cx-drumW/2+3; wx<cx+drumW/2-2; wx+=6) bgx.fillRect(wx,drumTop+2,1.4,cTop-drumTop-2); // colonnade
      }
    }
  },
  /* Mt. Rainier: one dominant snow-capped peak + foreground ridge */
  mountain:{
    build(){
      const px=W*0.48, peakY=horizonY-horizonY*0.52, n=90, pts=[];
      for(let i=0;i<=n;i++){ const x=(i/n)*W, u=Math.abs((x-px)/(W*0.5));
        let y=peakY+(horizonY-peakY)*Math.pow(u,1.5); y+=(Math.sin(i*0.7)+Math.sin(i*1.9))*horizonY*0.006; pts.push({x,y}); }
      const ridge=[]; for(let i=0;i<=n;i++){ const x=(i/n)*W, u=Math.abs((x-W*0.62)/(W*0.55));
        ridge.push({x,y:horizonY-horizonY*0.15+Math.pow(u,1.6)*horizonY*0.1+Math.sin(i*1.3)*horizonY*0.008}); }
      return {pts,ridge,snowY:peakY+horizonY*0.13};
    },
    draw(reflect,d){
      bgx.fillStyle=reflect?'#0f1428':'#131a2e';                                 // main massif (brighter)
      bgx.beginPath(); bgx.moveTo(0,horizonY); for(const p of d.pts) bgx.lineTo(p.x,p.y); bgx.lineTo(W,horizonY); bgx.closePath(); bgx.fill();
      if(!reflect){ bgx.save(); bgx.beginPath(); bgx.moveTo(0,horizonY); for(const p of d.pts) bgx.lineTo(p.x,p.y); bgx.lineTo(W,horizonY); bgx.closePath(); bgx.clip();
        bgx.fillStyle='#33406a'; bgx.beginPath(); bgx.moveTo(0,0); bgx.lineTo(W,0); bgx.lineTo(W,d.snowY);   // moonlit snow cap
        for(let i=0;i<=22;i++){ const x=W-(i/22)*W, y=d.snowY+Math.sin(i*1.7)*horizonY*0.018+((i%2)?horizonY*0.012:0); bgx.lineTo(x,y);} bgx.closePath(); bgx.fill(); bgx.restore(); }
      bgx.fillStyle=reflect?'#0a0e20':'#090e1c';                                 // dark foreground ridge
      bgx.beginPath(); bgx.moveTo(0,horizonY); for(const p of d.ridge) bgx.lineTo(p.x,p.y); bgx.lineTo(W,horizonY); bgx.closePath(); bgx.fill();
    }
  },
  /* small town square: low shops, church steeple, clock-tower town hall, trees */
  town:{
    build(){
      const b=[]; let x=-10;
      while(x<W+20){ const w=Math.random()*26+28, h=horizonY*(0.055+Math.random()*0.055), top=horizonY-h;
        const wins=[]; for(let wx=x+6; wx<x+w-4; wx+=12) if(Math.random()<0.6) wins.push({x:wx,y:top+7,lit:Math.random()});
        b.push({x,w,top,pitch:Math.random()<0.5,chimney:Math.random()<0.4,wins}); x+=w+Math.random()*8+4; }
      const trees=[]; for(let i=0;i<8;i++) trees.push({x:Math.random()*W,r:horizonY*(0.028+Math.random()*0.02)});
      return {b,trees};
    },
    draw(reflect,d){
      const near=reflect?'#0e1330':'#171e36';
      bgx.fillStyle=reflect?'#0a1222':'#0c1424';                                 // trees (brighter)
      for(const t of d.trees){ bgx.beginPath(); bgx.arc(t.x,horizonY-t.r*0.8,t.r,0,6.283); bgx.fill(); bgx.fillRect(t.x-1.5,horizonY-t.r*0.8,3,t.r); }
      bgx.fillStyle=near;
      for(const s of d.b){ bgx.fillRect(s.x,s.top,s.w,horizonY-s.top+2);
        if(s.pitch){ bgx.beginPath(); bgx.moveTo(s.x-2,s.top); bgx.lineTo(s.x+s.w/2,s.top-horizonY*0.028); bgx.lineTo(s.x+s.w+2,s.top); bgx.closePath(); bgx.fill(); }
        if(s.chimney) bgx.fillRect(s.x+s.w*0.7,s.top-horizonY*0.03,4,horizonY*0.03); }
      const sx=W*0.28, stTop=horizonY-horizonY*0.22; bgx.fillRect(sx-8,stTop,16,horizonY-stTop);          // church
      bgx.beginPath(); bgx.moveTo(sx-9,stTop); bgx.lineTo(sx,stTop-horizonY*0.085); bgx.lineTo(sx+9,stTop); bgx.closePath(); bgx.fill();
      const cx=W*0.52, twW=Math.min(W*0.05,44), twTop=horizonY-horizonY*0.27; bgx.fillRect(cx-twW/2,twTop,twW,horizonY-twTop); // town hall tower
      bgx.beginPath(); bgx.moveTo(cx-twW/2-3,twTop); bgx.lineTo(cx,twTop-horizonY*0.038); bgx.lineTo(cx+twW/2+3,twTop); bgx.closePath(); bgx.fill();
      bgx.fillRect(cx-3,twTop-horizonY*0.075,6,horizonY*0.04);                                            // cupola
      bgx.beginPath(); bgx.arc(cx,twTop-horizonY*0.075,5,Math.PI,2*Math.PI); bgx.fill();
      bgx.fillRect(cx-1,twTop-horizonY*0.1,2,horizonY*0.025);                                             // finial
      if(!reflect){
        for(const s of d.b) for(const w of s.wins){ bgx.globalAlpha=0.4+w.lit*0.5; bgx.fillStyle=w.lit>0.6?'#ffd27a':'#e8a94a'; bgx.fillRect(w.x,w.y,2.4,4);} bgx.globalAlpha=1;
        bgx.fillStyle='#ffd27a'; bgx.globalAlpha=0.85; bgx.beginPath(); bgx.arc(cx,twTop+horizonY*0.03,3,0,6.283); bgx.fill(); bgx.globalAlpha=1; // clock face
      }
    }
  }
};

function buildLED(text){
  text=text.toUpperCase(); const cols=[];
  for(const ch of text){ const g=FONT[ch]||FONT['?'];
    for(let c=0;c<5;c++){ const col=[]; for(let r=0;r<7;r++) col.push(g[r][c]==='X'?1:0); cols.push(col); }
    cols.push([0,0,0,0,0,0,0]); }
  if(cols.length>ledVisCols) for(let k=0;k<7;k++) cols.push([0,0,0,0,0,0,0]);
  return cols;
}
function roundRect(c,x,y,w,h,r){ c.beginPath(); c.moveTo(x+r,y); c.arcTo(x+w,y,x+w,y+h,r);
  c.arcTo(x+w,y+h,x,y+h,r); c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath(); }
function drawLEDSign(t){
  if(!ledCols||ledCols.length===0) return;
  const d=ledDot, rows=7, boardH=rows*d, visCols=ledVisCols, boardW=visCols*d;
  const bx=(W-boardW)/2, by=horizonY-14-boardH;
  bgx.save();
  bgx.fillStyle='rgba(8,6,4,0.82)'; roundRect(bgx,bx-d,by-d*0.8,boardW+2*d,boardH+1.6*d,6); bgx.fill();
  bgx.strokeStyle='rgba(255,150,60,0.25)'; bgx.lineWidth=1; bgx.stroke();
  const total=ledCols.length, scrolling=total>visCols;
  let startCol,pxShift;
  if(scrolling){ const s=ledScroll; startCol=Math.floor(s); pxShift=(s-startCol)*d; }
  else { startCol=-Math.floor((visCols-total)/2); pxShift=0; }
  bgx.save(); roundRect(bgx,bx,by,boardW,boardH,3); bgx.clip();
  for(let c=0;c<visCols+1;c++){
    let srcC=startCol+c; if(scrolling) srcC=((srcC%total)+total)%total;
    const colX=bx+c*d-pxShift;
    for(let r=0;r<rows;r++){
      const lit=(srcC>=0&&srcC<total)?ledCols[srcC][r]:0;
      const cx=colX+d/2, cy=by+r*d+d/2;
      if(lit){ bgx.fillStyle='rgba(255,140,40,0.32)'; bgx.beginPath(); bgx.arc(cx,cy,d*0.55,0,6.283); bgx.fill();
        bgx.fillStyle='rgba(255,203,112,1)'; bgx.beginPath(); bgx.arc(cx,cy,d*0.32,0,6.283); bgx.fill(); }
      else { bgx.fillStyle='rgba(255,150,60,0.055)'; bgx.beginPath(); bgx.arc(cx,cy,d*0.2,0,6.283); bgx.fill(); }
    }
  }
  bgx.restore();
  // water reflection of lit dots
  bgx.globalAlpha=0.16;
  for(let c=0;c<visCols+1;c++){
    let srcC=startCol+c; if(scrolling) srcC=((srcC%total)+total)%total;
    const colX=bx+c*d-pxShift;
    for(let r=0;r<rows;r++){
      const lit=(srcC>=0&&srcC<total)?ledCols[srcC][r]:0; if(!lit)continue;
      const cx=colX+d/2, cy0=by+r*d+d/2, cy=horizonY+(horizonY-cy0), wob=Math.sin(t*0.003+cx*0.05)*1.5;
      if(cy>horizonY&&cy<H){ bgx.fillStyle='rgba(255,170,70,0.85)'; bgx.beginPath(); bgx.arc(cx+wob,cy,d*0.3,0,6.283); bgx.fill(); }
    }
  }
  bgx.globalAlpha=1; bgx.restore();
  if(scrolling && ledSpeed>0){ ledScroll+=ledSpeed*dtGlobal; if(ledScroll>=total) ledScroll-=total; }
}

const GRAV=0.045;
function launch(tx,ty,o){
  ensureAudio(); o=o||{};
  const shell=o.shell||curShell;
  const colorName=o.colorName||curColor;
  const pal=o.pal!==undefined?o.pal:paletteFor(colorName);
  const params=o.params?{...o.params}:{...shellParams[shell]};
  const custom=(o.custom!==undefined)?o.custom:(shell==='custom'?customShell:null);
  const jitter=o.fuse?0:(Math.random()-0.5)*40;
  const x=tx+jitter, y0=horizonY-4;
  let vy,vx,fuse=null;
  if(o.fuse){                                   // timeline: detonate exactly T frames from now
    const T=Math.max(6,o.fuse); fuse=T;
    vy=(ty-y0-0.5*GRAV*T*(T-1))/T;              // discrete solve: integrator steps position before velocity
    vx=(tx-x)/T;
  } else { vy=-(Math.sqrt(2*GRAV*(horizonY-ty))+Math.random()*1.2); vx=(tx-x)/((horizonY-ty)/3+1); }
  const r={x,y:y0,tx,ty,vy,vx,fuse,shell,pal,params,custom};
  rockets.push(r); sndLaunch(); hideHint();
  if(recording && !o.noRec){
    const ev={id:nextId(),kind:'shell',t0:recNow()+recOffset,t1:null,shell,color:colorName,
      params:{...params},custom:copyCustom(custom),x:unShowX(tx),y:unShowY(ty)};
    r.recEv=ev; timeline.events.push(ev);
  }
  return r;
}
/* small drift so shaped bursts don't read as a rigid outline */
function jit(v,amt){ return v*(0.85+Math.random()*0.3)+(Math.random()-0.5)*(amt||0.55); }

/* ---- SHELL_DEFS: the single source of truth for every shell's fragment distribution.

const SPEED_REF=4.8;                                    // maps velocity magnitude -> 0..1 radius for regions/preview
const SHELL_DEFS={

    return {vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:72+Math.random()*30,size:2.2,drag:0.965,g:0.028}; }},

  ring:{n:66, emit:(i,n)=>{ const a=(i/n)*6.283,s=3.2;
    return {vx:jit(Math.cos(a)*s,0.55),vy:jit(Math.sin(a)*s*0.42,0.4),life:82+Math.random()*20,size:2.2,drag:0.955,g:0.025}; }},
  star:{n:104, emit:(i,n)=>{ const th=(i/n)*6.283, rad=0.42+0.62*Math.abs(Math.cos(2.5*th)), s=rad*3.9;

  heart:{n:108, emit:(i,n)=>{ const th=(i/n)*6.283, sc=0.20,

  palm:{n:13, emit:()=>{ const a=-Math.PI/2+(Math.random()-0.5)*1.3,s=Math.random()*1.5+3.2;

function regionOf(phi,rho,cuts){ let key=0;
  for(let i=0;i<cuts.length;i++){ const c=cuts[i]; let side;
    if(c.type==='ring') side = rho<c.r?0:1;
    else { const d=((phi-c.angle)%6.283+6.283)%6.283; side = d<Math.PI?0:1; }   // diameter line at angle
    key|=(side<<i); }
  return key;
}
function deformFactor(phi,def){ if(!def||def.mag<=0) return 1;
  const c=Math.cos(phi-def.angle), amt=def.bi?Math.abs(c):Math.max(0,c); return 1+def.mag*amt; }

/* one emitter for presets and custom layers alike */
function emitShell(x,y,def,pal,R,T,PE,cfg,nOverride){
  const n=nOverride||def.n;
  for(let i=0;i<n;i++){ if(parts.length>=MAX_PARTS) break;
    const f=def.emit(i,n); let vx=f.vx, vy=f.vy, c;
    if(cfg){                                             // custom shell: region color + deformation
      const phi=Math.atan2(vy,vx), rho=Math.min(1,Math.hypot(vx,vy)/SPEED_REF), k=deformFactor(phi,cfg.deform);
      vx*=k; vy*=k;
      c=cfg.regions[regionOf(phi,rho,cfg.cuts)]||(pal&&pal[0])||COLORS.gold;
    } else c=palColor(pal,i);
    const isTrail=T>0.10&&Math.random()<Math.min(0.98,0.25+T), life=f.life*PE;
    parts.push({x,y,vx:vx*R,vy:vy*R,life,max:life,size:f.size,type:isTrail?'trail':'glow',
      c,drag:f.drag,g:f.g,tr:isTrail?T:0}); }
}

function explode(x,y,pal,shell,params,cshell){
  sndBurst();
  const P=params||shellParams[shell]||{radius:1,trails:0.2,persist:1};
  if(shell==='custom'){
    const cs=cshell||customShell; if(!cs) return;
    const list=cs.shells||[cs];
    for(const cfg of list){ const def=SHELL_DEFS[cfg.base]||SHELL_DEFS.peony;
      const rt=cfg.rtp||{radius:1,trails:0.35,persist:1};
      const R=P.radius*rt.radius, T=Math.max(0,Math.min(1,P.trails*rt.trails)), PE=P.persist*rt.persist;
      const n=list.length>1?Math.round(def.n*0.68):def.n;   // thin each layer so two compose cleanly
      emitShell(x,y,def,pal,R,T,PE,cfg,n); }
    return;
  }
  emitShell(x,y,SHELL_DEFS[shell]||SHELL_DEFS.peony,pal,P.radius,P.trails,P.persist,null,null);
}

/* ---------------- render loop ---------------- */
let last=performance.now();
let fxFade=0, lastDrawn=0;
function frame(now){
  /* idle throttle: with nothing moving, twinkle at ~12fps instead of burning 60fps.
     Any activity (particles, playback, recording, rapid fire, a scrolling marquee) restores full rate. */
  const liveFx=parts.length||rockets.length||emitters.length||flashes.length;
  const active=liveFx||fxFade>0||tlPlaying||recording||rapidTimer||cornersOn
    ||(ledCols&&ledCols.length>ledVisCols&&ledSpeed>0);
  if(!active && now-lastDrawn<85){ requestAnimationFrame(frame); return; }
  lastDrawn=now;
  const dt=Math.min((now-last)/16.667,2); last=now; dtGlobal=dt;
  if(typeof tlTick==='function') tlTick(dt);      // advance the show clock, fire due events
  drawScene(now);
  if(liveFx) fxFade=36;                            // keep fading a beat after the last spark dies
  if(fxFade>0){
    ctx.globalCompositeOperation='destination-out'; ctx.fillStyle='rgba(0,0,0,0.16)'; ctx.fillRect(0,0,W,H);
    ctx.globalCompositeOperation='lighter';
    if(!liveFx){ fxFade-=dt; if(fxFade<=0){ ctx.globalCompositeOperation='source-over'; ctx.clearRect(0,0,W,H); } }
  }

  for(let i=emitters.length-1;i>=0;i--){ const e=emitters[i]; e.life-=dt;
    if(e.type==='fountain') spawnFountain(e);
    else if(e.type==='wheel'){ e.ang+=0.55*dt; wheelSpark(e); }
    else if(e.type==='candle'){ e.timer-=dt; if(e.timer<=0&&e.shots>0){ candleShot(e.x,e.y,e.pal,e.rtp); e.shots--; e.timer=e.gap; sndPop(); if(e.shots<=0) e.life=Math.min(e.life,26); } }
    if(e.life<=0) emitters.splice(i,1); }
  if(cornersOn){ spawnCorner(W*0.05,+1); spawnCorner(W*0.95,-1); }

  const wind=Math.sin(now*0.0003)*0.008;
  for(let i=rockets.length-1;i>=0;i--){ const r=rockets[i];
    if(r.serpent){ r.phase+=0.5*dt; r.x+=Math.sin(r.phase)*2.4*dt;
      if(parts.length<MAX_PARTS) parts.push({x:r.x+(Math.random()-0.5)*3,y:r.y,vx:(Math.random()-0.5)*0.6,vy:0.3,
        life:16+Math.random()*8,max:24,size:1.4,type:'ember',c:COLORS.gold,drag:0.9,g:0.03}); }
    r.x+=r.vx*dt; r.y+=r.vy*dt; r.vy+=GRAV*dt;
    const hc=(r.pal&&r.pal[0])||COLORS.gold;
    ctx.fillStyle=`rgba(${hc[0]},${hc[1]},${hc[2]},0.9)`; dot(r.x,r.y,2);
    ctx.fillStyle='rgba(255,200,120,0.5)'; dot(r.x,r.y+4,1.4);
    let boom=false;
    if(r.fuse!=null){ r.fuse-=dt; if(r.fuse<=0) boom=true; }        // timeline shells burst on their fuse
    else if(r.vy>=-0.4||r.y<=r.ty) boom=true;
    if(boom){ explode(r.x,r.y,r.pal,r.shell,r.params,r.custom);
      if(r.recEv && r.recEv.t1==null) r.recEv.t1=recNow()+recOffset;  // right edge = when it exploded
      rockets.splice(i,1); } }

  for(let i=flashes.length-1;i>=0;i--){ const f=flashes[i]; f.life-=dt;
    if(f.life<=0){ flashes.splice(i,1); continue; }
    const a=f.life/f.max, rg=ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,f.r);
    rg.addColorStop(0,`rgba(255,255,240,${a*0.9})`); rg.addColorStop(1,'rgba(255,255,240,0)');
    ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,6.283); ctx.fill(); }

  if(fxFade>0){
    drawParticles(dt,false,now,wind);
    ctx.save(); ctx.beginPath(); ctx.rect(0,horizonY,W,H-horizonY); ctx.clip();
    ctx.translate(0,horizonY*2); ctx.scale(1,-1); ctx.globalAlpha=0.28; drawParticles(0,true,now,0); ctx.restore();
  }
  requestAnimationFrame(frame);
}
function drawParticles(dt,reflectOnly,now,wind){
  for(let i=parts.length-1;i>=0;i--){ const p=parts[i];
    if(dt>0){ p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx=p.vx*p.drag+wind*dt; p.vy=p.vy*p.drag+p.g*dt; p.life-=dt;
      if(p.life<=0){ parts.splice(i,1); continue; } }
    const lifeR=Math.max(0,p.life/p.max);
    let a=reflectOnly?lifeR*lifeR:lifeR;
    const c=p.c;
    // cheap sparkle: one sin per particle, seeded by position so no extra state is stored
    if(!reflectOnly){ const tw=0.78+0.22*Math.sin(now*0.02+p.x*0.55+p.y*0.37);
      a*= (p.type==='glow') ? (0.9+0.1*tw) : tw; }
    const wob=reflectOnly?Math.sin(now*0.004+p.y*0.05)*2.2:0;
    ctx.fillStyle=`rgba(${c[0]},${c[1]},${c[2]},${a})`; dot(p.x+wob,p.y,p.size*(0.6+lifeR*0.6));
    // hot core: small, faint, and only while the spark is young — colour should dominate
    // hot core: a lightened version of the spark's OWN color (not white), faint, young sparks only
    if(!reflectOnly && lifeR>0.6){ const cr=(c[0]*5+255)/6|0, cg=(c[1]*5+255)/6|0, cb=(c[2]*5+255)/6|0;
      ctx.fillStyle=`rgba(${cr},${cg},${cb},${a*0.10})`; dot(p.x,p.y,p.size*0.28*lifeR); }
    if(!reflectOnly&&p.type==='trail'&&parts.length<MAX_PARTS){
      const tr=p.tr||0.5, prob=0.35+0.6*tr;
      if(Math.random()<prob){ const el=18+34*tr;
        parts.push({x:p.x,y:p.y,vx:(Math.random()-0.5)*0.35,vy:0.35,life:el,max:el,size:1.5,type:'ember',c:p.c,drag:0.93,g:0.03,tr:0}); }
    }
  }
}
function dot(x,y,r){ ctx.beginPath(); ctx.arc(x,y,r,0,6.283); ctx.fill(); }

let AC=null,muted=false,masterGain=null;
function ensureAudio(){ if(AC){ if(AC.state==='suspended') AC.resume(); return; } try{ AC=new (window.AudioContext||window.webkitAudioContext)();
  masterGain=AC.createGain(); masterGain.gain.value=muted?0:0.5; masterGain.connect(AC.destination);}catch(e){AC=null;} }
/* iOS starts the audio context suspended and re-suspends it when the app is backgrounded.
   ensureAudio() resumes it on every gesture; this just covers coming back from the background. */
document.addEventListener('visibilitychange',()=>{ if(!document.hidden && AC && AC.state==='suspended') AC.resume(); });
function nb(dur){ const len=AC.sampleRate*dur, b=AC.createBuffer(1,len,AC.sampleRate), d=b.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=Math.random()*2-1; return b; }
function sndLaunch(){ if(!AC||muted)return; const t=AC.currentTime; const s=AC.createBufferSource(); s.buffer=nb(0.3);
  const bp=AC.createBiquadFilter(); bp.type='bandpass'; bp.frequency.setValueAtTime(400,t); bp.frequency.exponentialRampToValueAtTime(1800,t+0.28); bp.Q.value=6;
  const g=AC.createGain(); g.gain.setValueAtTime(0.001,t); g.gain.exponentialRampToValueAtTime(0.14,t+0.05); g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
  s.connect(bp); bp.connect(g); g.connect(masterGain); s.start(t); s.stop(t+0.3); }
function sndBurst(){ if(!AC||muted)return; const t=AC.currentTime; const o=AC.createOscillator(); o.type='sine';
  o.frequency.setValueAtTime(120,t); o.frequency.exponentialRampToValueAtTime(40,t+0.25);
  const og=AC.createGain(); og.gain.setValueAtTime(0.5,t); og.gain.exponentialRampToValueAtTime(0.001,t+0.35);
  o.connect(og); og.connect(masterGain); o.start(t); o.stop(t+0.35);
  const s=AC.createBufferSource(); s.buffer=nb(0.5); const hp=AC.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=1200;
  const g=AC.createGain(); g.gain.setValueAtTime(0.24,t+0.02); g.gain.exponentialRampToValueAtTime(0.001,t+0.5);
  s.connect(hp); hp.connect(g); g.connect(masterGain); s.start(t+0.02); s.stop(t+0.5); }
function sndSalute(){ if(!AC||muted)return; const t=AC.currentTime; const s=AC.createBufferSource(); s.buffer=nb(0.15);
  const hp=AC.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=800;
  const g=AC.createGain(); g.gain.setValueAtTime(0.5,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.14);
  s.connect(hp); hp.connect(g); g.connect(masterGain); s.start(t); s.stop(t+0.15);
  const o=AC.createOscillator(); o.type='square'; o.frequency.setValueAtTime(90,t); o.frequency.exponentialRampToValueAtTime(30,t+0.1);

  const hp=AC.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=2600;

/* Buffer-based player: decode once, play through masterGain (same path as the SFX).
   Avoids <audio>/createMediaElementSource, which can be silent or throw in sandboxed iframes. */
const audioPlayer={ buf:null,src:null,gain:null,playing:false,startedAt:0,offset:0,dur:0,
  async load(file){ return this.loadBuffer(await file.arrayBuffer()); },
  async loadBuffer(raw){ this.stop(); ensureAudio(); if(!AC) throw new Error('no audio context');
    this.buf=await AC.decodeAudioData(raw.slice(0));   // throws on unsupported codec -> surfaced to caller
    this.dur=this.buf.duration; this.offset=0; return this.buf; },
  play(opts){ ensureAudio(); if(!AC||!this.buf||!this.dur) return; if(AC.state==='suspended') AC.resume();
    if(!this.gain){ this.gain=AC.createGain(); this.gain.gain.value=0.9; this.gain.connect(masterGain); }
    this.stop();
    this.src=AC.createBufferSource(); this.src.buffer=this.buf;
    this.src.loop=!(opts&&opts.loop===false);

    this.startedAt=AC.currentTime-this.offset; this.playing=true; },
  stop(){ if(this.src){ try{this.src.stop();}catch(e){} try{this.src.disconnect();}catch(e){} this.src=null; }
    this.playing=false; },

/* minimal Standard-MIDI-File parser -> sorted note list [{m,t,d,v}] (no external deps) */
function parseMIDI(buf){
  const dv=new DataView(buf); if(dv.getUint32(0)!==0x4d546864) throw new Error('Not a MIDI file');
  const ntrk=dv.getUint16(10); let div=dv.getUint16(12); if(div&0x8000) div=480; if(!div) div=480;
  const P={o:14}, vlq=()=>{ let v=0,b; do{ b=dv.getUint8(P.o++); v=(v<<7)|(b&0x7f); }while(b&0x80); return v; };
  const tempos=[{tick:0,us:500000}], raw=[];
  for(let tr=0;tr<ntrk && P.o<dv.byteLength;tr++){
    if(dv.getUint32(P.o)!==0x4d54726b) break; const end=P.o+8+dv.getUint32(P.o+4); P.o+=8;
    let tick=0,status=0;
    while(P.o<end){ tick+=vlq(); const b=dv.getUint8(P.o);
      if(b&0x80){ status=b; P.o++; }                               // else: running status
      if(status===0xff){ const type=dv.getUint8(P.o++), l=vlq();
        if(type===0x51&&l===3) tempos.push({tick,us:(dv.getUint8(P.o)<<16)|(dv.getUint8(P.o+1)<<8)|dv.getUint8(P.o+2)}); P.o+=l; }
      else if(status===0xf0||status===0xf7){ P.o+=vlq(); }
      else { const hi=status&0xf0, ch=status&0x0f;
        if(hi===0x90){ const n=dv.getUint8(P.o++), v=dv.getUint8(P.o++); raw.push({tick,on:v>0,ch,n,v}); }
        else if(hi===0x80){ const n=dv.getUint8(P.o++); P.o++; raw.push({tick,on:false,ch,n,v:0}); }
        else if(hi===0xa0||hi===0xb0||hi===0xe0) P.o+=2;
        else if(hi===0xc0||hi===0xd0) P.o+=1;
        else P.o++; }
    }
    P.o=end;
  }
  tempos.sort((a,b)=>a.tick-b.tick);
  const t2s=(t)=>{ let s=0,last=0,us=500000; for(const seg of tempos){ if(seg.tick>t) break; s+=(seg.tick-last)/div*(us/1e6); last=seg.tick; us=seg.us; } return s+(t-last)/div*(us/1e6); };
  raw.sort((a,b)=>a.tick-b.tick);
  const open={}, notes=[];
  for(const e of raw){ const k=e.ch*128+e.n;
    if(e.on){ (open[k]||(open[k]=[])).push(e.tick); }
    else { const a=open[k]; if(a&&a.length){ const st=a.shift(); notes.push({m:e.n,t:t2s(st),d:Math.max(0.05,t2s(e.tick)-t2s(st)),v:0.8}); } } }
  notes.sort((a,b)=>a.t-b.t); return notes;
}
const midiPlayer={ notes:null,dur:0,idx:0,t0:0,playing:false,timer:null,gain:null,
  load(buf){ this.notes=parseMIDI(buf); let d=0; for(const n of this.notes) d=Math.max(d,n.t+n.d); this.dur=d; },
  start(){ ensureAudio(); if(!AC||!this.notes||!this.notes.length)return; if(AC.state==='suspended')AC.resume();
    if(!this.gain){ this.gain=AC.createGain(); this.gain.gain.value=0.55; this.gain.connect(masterGain); }
    this.idx=0; this.t0=AC.currentTime+0.12; this.playing=true;
    if(this.timer) clearInterval(this.timer); this.timer=setInterval(()=>this.sched(),25); },
  stop(){ this.playing=false; if(this.timer){ clearInterval(this.timer); this.timer=null; } },
  sched(){ if(!this.playing||!AC)return; const ahead=(AC.currentTime+0.2)-this.t0;
    while(this.idx<this.notes.length && this.notes[this.idx].t<=ahead){ const n=this.notes[this.idx++]; this.voice(440*Math.pow(2,(n.m-69)/12),this.t0+n.t,n.d,n.v); }
    if(this.idx>=this.notes.length && AC.currentTime>this.t0+this.dur+0.4){ this.idx=0; this.t0=AC.currentTime+0.12; } },
  voice(f,t,dur,vel){ const o=AC.createOscillator(); o.type='triangle'; o.frequency.value=f;
    const o2=AC.createOscillator(); o2.type='sine'; o2.frequency.value=f*2;
    const g=AC.createGain(), peak=Math.max(0.003,0.12*vel), r=Math.min(0.15,dur*0.4);

/* ---- signal analysis at load: energy + onset-flux envelopes (dependency-free) ----
   Meyda / aubio.js / essentia.js give richer features (spectral, BPM) but ship via
   unpkg/WASM the sandbox may block; RMS energy ('energy' in Meyda) is a few lines and
   reliable. The sequencer will read `analysis` to color the timeline + bias density. */
let analysis=null;                  // {duration, frameSec, energy:[0..1], flux:[0..1]}
function analyzeBuffer(abuf){
  const sr=abuf.sampleRate, ch0=abuf.getChannelData(0), ch1=abuf.numberOfChannels>1?abuf.getChannelData(1):null;
  const frame=Math.max(1,Math.round(sr*0.046));           // ~46ms frames
  const energy=[];
  for(let i=0;i<ch0.length;i+=frame){ let s=0; const n=Math.min(frame,ch0.length-i);
    for(let j=0;j<n;j++){ let v=ch0[i+j]; if(ch1) v=(v+ch1[i+j])*0.5; s+=v*v; } energy.push(Math.sqrt(s/n)); }
  return finishAnalysis(energy, frame/sr, abuf.duration);
}
function analyzeMIDINotes(notes,dur){
  const frameSec=0.046, bins=Math.max(1,Math.ceil(dur/frameSec)), energy=new Array(bins).fill(0);
  for(const n of notes){ const i=Math.floor(n.t/frameSec); if(i>=0&&i<bins) energy[i]+=n.v; }
  return finishAnalysis(energy, frameSec, dur);
}
function finishAnalysis(energy, frameSec, duration){
  const max=Math.max(1e-6,...energy);
  const raw=energy.map(v=>v/max);
  // rolling 3s average (±1.5s) via prefix sums — smooths out the 46ms sampling grid
  const half=Math.max(1,Math.round(1.5/frameSec)), n=raw.length;
  const pre=new Float64Array(n+1);
  for(let i=0;i<n;i++) pre[i+1]=pre[i]+raw[i];
  const sm=new Array(n);
  for(let i=0;i<n;i++){ const a=Math.max(0,i-half), b=Math.min(n,i+half+1);
    sm[i]=(pre[b]-pre[a])/(b-a); }
  const smax=Math.max(1e-6,...sm), e=sm.map(v=>v/smax);   // renormalize after smoothing
  const flux=raw.map((v,i)=> i? Math.max(0,v-raw[i-1]) : 0), fmax=Math.max(1e-6,...flux);
  const nf=flux.map(v=>v/fmax);
  /* accents = onset peaks: local maxima in flux, clearly above the local noise floor */
  const mean=nf.reduce((a,b)=>a+b,0)/Math.max(1,nf.length);
  const sd=Math.sqrt(nf.reduce((a,b)=>a+(b-mean)*(b-mean),0)/Math.max(1,nf.length));
  const thr=mean+1.1*sd, accents=[];
  for(let i=1;i<nf.length-1;i++){
    if(nf[i]>thr && nf[i]>=nf[i-1] && nf[i]>nf[i+1]){
      const t=i*frameSec;
      if(!accents.length || t-accents[accents.length-1].t>0.12) accents.push({t,s:nf[i]});
      else if(nf[i]>accents[accents.length-1].s) accents[accents.length-1]={t,s:nf[i]};
    }
  }
  analysis={duration,frameSec,energy:e,accents};
  if(typeof tlRefresh==='function') tlRefresh();   // repaint the song bar with fresh energy colors
  return analysis;
}

function isMidiBuffer(buf){ const d=new DataView(buf);
  return d.byteLength>4 && d.getUint32(0)===0x4d546864; }   // "MThd"

function setAudioStatus(sym,opts){ audStatus.textContent=sym; trackSel.classList.toggle('on',!!(opts&&opts.on));
  if(opts&&opts.clearMs) setTimeout(()=>{ if(audStatus.textContent===sym) audStatus.textContent=''; },opts.clearMs); }
function flashLabel(lbl,base,msg,ms){ lbl.firstChild.nodeValue=msg;
  setTimeout(()=>{ lbl.firstChild.nodeValue=base; }, ms||2200); }

async function loadMidiBuffer(buf){

}
async function loadAudioBuffer(name,buf){

/* ---- preset track dropdown, backed by tracks.json ----
   Every failure path (no file, file://, bad JSON, empty/invalid list) must still leave a
   working "Choose file…" dropdown. Presets are a bonus, never a requirement. */
let trackList=[];
function populateTrackSel(note){
  trackSel.innerHTML='';
  const ph=document.createElement('option'); ph.value=''; ph.disabled=true; ph.selected=true;
  ph.textContent = trackList.length ? 'Select a track…' : (note||'Choose a file…');
  trackSel.appendChild(ph);
  trackList.forEach((t,i)=>{ const o=document.createElement('option'); o.value=String(i); o.textContent=t.display; trackSel.appendChild(o); });
  const cf=document.createElement('option'); cf.value='__file__'; cf.textContent='Choose file…'; trackSel.appendChild(cf);
}
function normalizeTracks(data){
  const arr = Array.isArray(data) ? data : (data && Array.isArray(data.tracks) ? data.tracks : []);
  const str=(v,f)=> (typeof v==='string' && v.trim()) ? v.trim() : f;
  return arr.filter(t=>t && typeof t.url==='string' && t.url)     // a track is unusable without a URL
    .map(t=>{ const name=str(t.name, t.url.split('/').pop());
      return { name, display: str(t.display, name),              // display = dropdown label; falls back to name
               url: t.url, source: str(t.source,'') }; });
}
async function loadTrackManifest(){
  // opened straight from disk? fetch can't work, so don't try — just offer the file picker.
  if(location.protocol==='file:'){ trackList=[]; populateTrackSel('Choose a file…'); return; }
  try{
    const res=await fetch('tracks.json',{cache:'no-store'});
    if(!res.ok) throw new Error('manifest HTTP '+res.status);
    let data; try{ data=await res.json(); }
    catch(e){ throw new Error('manifest is not valid JSON'); }
    trackList=normalizeTracks(data);
    populateTrackSel(trackList.length ? null : 'No presets listed — choose a file');
  }catch(e){
    console.info('No preset tracks loaded ('+e.message+') — file picker still available.');
    trackList=[]; populateTrackSel('Choose a file…');
  }
}
loadTrackManifest();
trackSel.onchange=async()=>{
  const v=trackSel.value;
  if(v==='__file__'){ trackSel.value=''; audioFile.click(); return; }   // reset so it can be re-selected next time
  const t=trackList[parseInt(v,10)]; if(!t) return;
  ensureAudio(); if(AC&&AC.state==='suspended') AC.resume();            // resume inside this gesture, before awaiting
  setAudioStatus('…');
  try{
    const res=await fetch(t.url); if(!res.ok) throw new Error('fetch failed: '+res.status);
    const buf=await res.arrayBuffer();
    if(isMidiBuffer(buf)) await loadMidiBuffer(buf);      // in case a preset entry points at a .mid file
    else await loadAudioBuffer(t.name,buf);
  }catch(err){ console.error('could not load preset track:',t.url,err);
    setAudioStatus('✗',{clearMs:2600}); trackSel.value=''; }   // don't leave a failed track looking selected
};

audioFile.onchange=async e=>{ const f=e.target.files[0]; if(!f) return;
  ensureAudio(); if(AC&&AC.state==='suspended') AC.resume();   // resume inside the user gesture, before awaiting
  setAudioStatus('…');
  try{
    const buf=await f.arrayBuffer();
    if(isMidiBuffer(buf)){ await loadMidiBuffer(buf);          // you picked a MIDI — that's fine
      setAudioStatus(''); return; }
    await loadAudioBuffer(f.name.replace(/\.[^.]+$/,''),buf);
  }catch(err){ console.error('could not load audio:',err); setAudioStatus('✗',{clearMs:2200}); }
  finally{ e.target.value=''; };                              // allow re-picking the same file
};
midiFile.onchange=async e=>{ const f=e.target.files[0]; if(!f) return;
  ensureAudio(); if(AC&&AC.state==='suspended') AC.resume();
  midLabel.firstChild.nodeValue='MIDI…';
  try{
    const buf=await f.arrayBuffer();
    if(isMidiBuffer(buf)) await loadMidiBuffer(buf);
    else { await loadAudioBuffer(f.name.replace(/\.[^.]+$/,''),buf);   // you picked an audio file — that's fine too
      flashLabel(midLabel,'MIDI','MIDI'); }
  }catch(err){ console.error('could not load midi:',err);
    flashLabel(midLabel,'MIDI','Not MIDI ✗'); }
  finally{ e.target.value=''; };
};

/* ---------------- Shell Builder ---------------- */
const DEFAULT_REGION=[255,190,74];
function defaultShellCfg(){ return {base:'peony',cuts:[],regions:{},deform:{angle:0,mag:0,bi:false},
  rtp:{radius:DEF_R,trails:DEF_T,persist:DEF_P}}; }
function defaultBuilder(){ return {shells:[defaultShellCfg()],active:0}; }
let builder=defaultBuilder(), customShell=null, paintColor=[255,66,66], previewFrags=[[],[]];
let bW=300, bH=300;
function act(){ return builder.shells[builder.active]; }
const bcanvas=document.getElementById('bcanvas');
const openBuilder=document.getElementById('openBuilder'), builderOverlay=document.getElementById('builderOverlay');
const bBase=document.getElementById('bBase'), addSlice=document.getElementById('addSlice'), addRing=document.getElementById('addRing');
const cutList=document.getElementById('cutList'), bColorsEl=document.getElementById('bColors');
const dBi=document.getElementById('dBi');
const bRadius=document.getElementById('bRadius'), bTrails=document.getElementById('bTrails'), bPersist=document.getElementById('bPersist');
let dragTarget=null;
const addLayer=document.getElementById('addLayer'), switchLayer=document.getElementById('switchLayer');
const delLayer=document.getElementById('delLayer'), layerTag=document.getElementById('layerTag');

/* preview frags come straight from SHELL_DEFS, so the circle matches what actually fires */
function genPreviewFrags(base,slot){ const def=SHELL_DEFS[base]||SHELL_DEFS.peony, n=Math.max(def.n,90), arr=[];
  for(let i=0;i<n;i++){ const f=def.emit(i,n); arr.push({vx:f.vx,vy:f.vy}); }
  previewFrags[slot]=arr; }
function fitBuilderCanvas(){
  const stage=bcanvas.parentElement, r=stage.getBoundingClientRect();
  const w=Math.max(1,Math.round(r.width)), h=Math.max(1,Math.round(r.height));
  if(!w||!h) return false;
  const d=Math.min(window.devicePixelRatio||1,2);
  if(w===bW && h===bH && bcanvas.width===Math.round(w*d)) return false;   // already correct
  bW=w; bH=h;
  bcanvas.width=Math.round(w*d); bcanvas.height=Math.round(h*d);
  bcanvas.getContext('2d').setTransform(d,0,0,d,0,0);
  return true;
}
/* The deformation vector can push fragments out to (1 + mag)x the base radius.
   Shrink the reference circle so even a fully-deformed shell stays inside the canvas. */
function builderReach(){
  let m=1;
  for(let i=0;i<builder.shells.length;i++){
    const d=builder.shells[i].deform;
    if(d && d.mag>0) m=Math.max(m, 1+d.mag);
  }
  return m;
}
function builderAvail(){ return Math.min(bW,bH)/2-14; }   // unscaled half-extent (drag reference)
function bgeom(){
  const R=Math.max(24, builderAvail()/builderReach());     // base circle shrinks as the shape grows outward
  return {cx:bW/2, cy:bH/2, R};
}
function arrow(g,x0,y0,x1,y1){ g.beginPath(); g.moveTo(x0,y0); g.lineTo(x1,y1); g.stroke(); const a=Math.atan2(y1-y0,x1-x0);
  g.beginPath(); g.moveTo(x1,y1); g.lineTo(x1-9*Math.cos(a-0.4),y1-9*Math.sin(a-0.4)); g.lineTo(x1-9*Math.cos(a+0.4),y1-9*Math.sin(a+0.4)); g.closePath(); g.fill(); }
function drawBuilder(){ fitBuilderCanvas();   // self-heal: never draw against a stale size
  const g=bcanvas.getContext('2d'), {cx,cy,R}=bgeom(), def=(COLORS[curColor]||DEFAULT_REGION);
  g.clearRect(0,0,bW,bH);
  g.fillStyle='#171e36'; g.beginPath(); g.arc(cx,cy,R,0,6.283); g.fill();          // the circle IS the workspace
  g.strokeStyle='rgba(255,180,90,0.28)'; g.lineWidth=1; g.beginPath(); g.arc(cx,cy,R,0,6.283); g.stroke();
  const k=R/SPEED_REF;                                                              // velocity units -> canvas px
  const plot=(cfg,frags,alpha,dotR)=>{ g.globalAlpha=alpha;
    for(const f of frags){ const phi=Math.atan2(f.vy,f.vx), rho=Math.min(1,Math.hypot(f.vx,f.vy)/SPEED_REF);
      const d=deformFactor(phi,cfg.deform), col=cfg.regions[regionOf(phi,rho,cfg.cuts)]||def;
      const px=cx+f.vx*k*d, py=cy+f.vy*k*d;
      g.fillStyle=`rgb(${col[0]},${col[1]},${col[2]})`; g.beginPath(); g.arc(px,py,dotR,0,6.283); g.fill(); }
    g.globalAlpha=1; };
  if(builder.shells.length>1){ const oi=1-builder.active; plot(builder.shells[oi],previewFrags[oi]||[],0.22,2); }  // ghost
  const A=act(); plot(A,previewFrags[builder.active]||[],1,2.2);
  g.strokeStyle='rgba(255,255,255,0.55)'; g.lineWidth=1.4;
  for(const c of A.cuts){ if(c.type==='ring'){ g.beginPath(); g.arc(cx,cy,c.r*R,0,6.283); g.stroke();
      const gx=cx+Math.cos(-0.785)*c.r*R, gy=cy+Math.sin(-0.785)*c.r*R;                    // ring grab handle
      g.fillStyle='#fff'; g.beginPath(); g.arc(gx,gy,4.5,0,6.283); g.fill(); }
    else { g.beginPath(); g.moveTo(cx+Math.cos(c.angle)*R,cy+Math.sin(c.angle)*R); g.lineTo(cx-Math.cos(c.angle)*R,cy-Math.sin(c.angle)*R); g.stroke();
      g.fillStyle='#fff';                                                                   // slice grab handles at both ends
      g.beginPath(); g.arc(cx+Math.cos(c.angle)*R,cy+Math.sin(c.angle)*R,4.5,0,6.283); g.fill();
      g.beginPath(); g.arc(cx-Math.cos(c.angle)*R,cy-Math.sin(c.angle)*R,4.5,0,6.283); g.fill(); } }
  const a=A.deform.angle, len=(A.deform.mag||0)*R;
  if(len>0){ g.strokeStyle='#ff5a2c'; g.fillStyle='#ff5a2c'; g.lineWidth=2; arrow(g,cx,cy,cx+Math.cos(a)*len,cy+Math.sin(a)*len);
    if(A.deform.bi) arrow(g,cx,cy,cx-Math.cos(a)*len,cy-Math.sin(a)*len); }
  const hr=len||R*0.14, hx=cx+Math.cos(a)*hr, hy=cy+Math.sin(a)*hr;
  g.fillStyle='#ffb347'; g.beginPath(); g.arc(hx,hy,6,0,6.283); g.fill();
  if(A.deform.bi&&len>0){ g.beginPath(); g.arc(cx-Math.cos(a)*hr,cy-Math.sin(a)*hr,6,0,6.283); g.fill(); }
  g.fillStyle='rgba(255,255,255,0.5)'; g.beginPath(); g.arc(cx,cy,2,0,6.283); g.fill(); }   // vector origin = center
function renderCutList(){ cutList.innerHTML=''; const A=act();
  A.cuts.forEach((c,idx)=>{ const row=document.createElement('div'); row.className='brow cutrow';
    const lbl=document.createElement('span'); lbl.className='bnote';
    lbl.textContent = c.type==='ring' ? `Ring · radius ${(c.r*100)|0}%` : `Slice · ${Math.round(((c.angle*180/Math.PI)%180+180)%180)}°`;
    const rm=document.createElement('button'); rm.className='btn'; rm.textContent='×';
    rm.onclick=()=>{ A.cuts.splice(idx,1); A.regions={}; renderCutList(); updateCutBtns(); drawBuilder(); };
    row.append(lbl,rm); cutList.appendChild(row); }); }
function updateCutBtns(){ const full=act().cuts.length>=2; addSlice.disabled=full; addRing.disabled=full;
  addSlice.style.opacity=full?0.4:1; addRing.style.opacity=full?0.4:1; }
function updateLayerBtns(){ const two=builder.shells.length>1;
  layerTag.textContent=`LAYER ${builder.active+1}/${builder.shells.length}`;
  addLayer.style.display=two?'none':''; switchLayer.style.display=two?'':'none'; delLayer.style.display=two?'':'none'; }
function syncBuilderControls(){ const A=act(); bBase.value=A.base; dBi.classList.toggle('on',A.deform.bi);
  bRadius.value=A.rtp.radius; bTrails.value=A.rtp.trails; bPersist.value=A.rtp.persist;
  renderCutList(); updateCutBtns(); updateLayerBtns(); }
bRadius.oninput=()=>{ act().rtp.radius=parseFloat(bRadius.value); };
bTrails.oninput=()=>{ act().rtp.trails=parseFloat(bTrails.value); };
bPersist.oninput=()=>{ act().rtp.persist=parseFloat(bPersist.value); };

['red','gold','green','blue','purple','silver'].forEach((name,i)=>{ const c=COLORS[name], sw=document.createElement('div');
  sw.className='sw'+(i===0?' on':''); sw.style.background=`rgb(${c[0]},${c[1]},${c[2]})`; sw.style.color=`rgb(${c[0]},${c[1]},${c[2]})`;
  sw.onclick=()=>{ paintColor=c; bColorsEl.querySelectorAll('.sw').forEach(e=>e.classList.remove('on')); sw.classList.add('on'); };
  bColorsEl.appendChild(sw); });

bBase.onchange=()=>{ act().base=bBase.value; genPreviewFrags(bBase.value,builder.active); drawBuilder(); };
addSlice.onclick=()=>{ const A=act(); if(A.cuts.length<2){ A.cuts.push({type:'linear',angle:Math.PI/2}); A.regions={}; renderCutList(); updateCutBtns(); drawBuilder(); } };
addRing.onclick=()=>{ const A=act(); if(A.cuts.length<2){ A.cuts.push({type:'ring',r:0.5}); A.regions={}; renderCutList(); updateCutBtns(); drawBuilder(); } };
dBi.onclick=()=>{ const A=act(); A.deform.bi=!A.deform.bi; dBi.classList.toggle('on',A.deform.bi); drawBuilder(); };
document.getElementById('dReset').onclick=()=>{ const A=act(); A.deform={angle:0,mag:0,bi:false};
  dBi.classList.remove('on'); drawBuilder(); };

addLayer.onclick=()=>{ if(builder.shells.length<2){ builder.shells.push(defaultShellCfg()); builder.active=1;
  genPreviewFrags(act().base,1); syncBuilderControls(); drawBuilder(); } };
switchLayer.onclick=()=>{ builder.active=1-builder.active; genPreviewFrags(act().base,builder.active); syncBuilderControls(); drawBuilder(); };
let delArmed=false, delTimer=null;
delLayer.onclick=()=>{ if(builder.shells.length<2) return;
  if(!delArmed){ delArmed=true; delLayer.textContent='Sure?'; delLayer.classList.add('on');
    delTimer=setTimeout(()=>{ delArmed=false; delLayer.textContent='Delete Other'; delLayer.classList.remove('on'); },2500); return; }
  clearTimeout(delTimer); delArmed=false; delLayer.textContent='Delete Other'; delLayer.classList.remove('on');
  builder.shells=[act()]; builder.active=0; genPreviewFrags(act().base,0); syncBuilderControls(); drawBuilder(); };

function bpos(e){ const r=bcanvas.getBoundingClientRect(); return {x:e.clientX-r.left, y:e.clientY-r.top}; }
function hitTest(p){ const {cx,cy,R}=bgeom(), A=act();
  const dx=p.x-cx, dy=p.y-cy, dist=Math.hypot(dx,dy);
  const a=A.deform.angle, len=(A.deform.mag||0)*R, hr=len||R*0.14;
  if(Math.hypot(p.x-(cx+Math.cos(a)*hr),p.y-(cy+Math.sin(a)*hr))<15) return {kind:'vec',flip:false};
  if(A.deform.bi&&len>0 && Math.hypot(p.x-(cx-Math.cos(a)*hr),p.y-(cy-Math.sin(a)*hr))<15) return {kind:'vec',flip:true};
  for(let i=0;i<A.cuts.length;i++){ const c=A.cuts[i];
    if(c.type==='ring'){ if(Math.abs(dist-c.r*R)<11) return {kind:'ring',idx:i}; }
    else { const perp=Math.abs(-Math.sin(c.angle)*dx+Math.cos(c.angle)*dy);   // distance to the diameter line
      if(perp<10 && dist<=R*1.04) return {kind:'slice',idx:i}; } }
  return null; }
bcanvas.addEventListener('pointerdown',e=>{ const p=bpos(e), {cx,cy,R}=bgeom(), h=hitTest(p);
  if(h){ dragTarget=h; bcanvas.setPointerCapture(e.pointerId); return; }
  const dx=p.x-cx, dy=p.y-cy, dist=Math.hypot(dx,dy), A=act();
  if(dist<=R*1.06){ A.regions[regionOf(Math.atan2(dy,dx),Math.min(1,dist/R),A.cuts)]=paintColor; drawBuilder(); } });
bcanvas.addEventListener('pointermove',e=>{ const p=bpos(e), {cx,cy,R}=bgeom(), A=act();
  if(!dragTarget){ bcanvas.style.cursor=hitTest(p)?'grab':'crosshair'; return; }
  const dx=p.x-cx, dy=p.y-cy, dist=Math.hypot(dx,dy), ang=Math.atan2(dy,dx);
  if(dragTarget.kind==='vec'){ A.deform.angle=dragTarget.flip?ang+Math.PI:ang;
    // handle sits at mag*R with R = avail/(1+mag) -> invert so it stays under the pointer
    const av=builderAvail(), mg=(dist>=av*0.99)?1.2:dist/Math.max(1,av-dist);
    A.deform.mag=Math.max(0,Math.min(1.2,mg)); }
  else if(dragTarget.kind==='ring'){ A.cuts[dragTarget.idx].r=Math.max(0.12,Math.min(0.95,dist/R)); }
  else if(dragTarget.kind==='slice'){ A.cuts[dragTarget.idx].angle=((ang%Math.PI)+Math.PI)%Math.PI; }
  bcanvas.style.cursor='grabbing'; renderCutList(); drawBuilder(); });
bcanvas.addEventListener('pointerup',()=>{ dragTarget=null; bcanvas.style.cursor='crosshair'; });
bcanvas.addEventListener('pointercancel',()=>{ dragTarget=null; });

let builderTarget=null;   // null = console custom shell; otherwise a timeline shell event
function builderConfig(){ return {shells:builder.shells.map(s=>({base:s.base,cuts:s.cuts.map(c=>({...c})),
  regions:{...s.regions},deform:{...s.deform},rtp:{...s.rtp}}))}; }
function loadBuilderFrom(cs){                                     // populate the builder UI from a saved config
  if(cs && cs.shells && cs.shells.length){
    builder={shells:cs.shells.map(s=>({base:s.base,cuts:s.cuts.map(c=>({...c})),
      regions:{...s.regions},deform:{...s.deform},rtp:{...(s.rtp||{radius:1,trails:0.3,persist:1.05})}})),active:0};
  } else builder=defaultBuilder();
}
function openBuilderUI(){ builderOverlay.classList.add('on'); fitBuilderCanvas();
  builder.shells.forEach((s,i)=>genPreviewFrags(s.base,i)); syncBuilderControls(); drawBuilder(); }
openBuilder.onclick=()=>{ builderTarget=null;                    // opened from the console
  if(customShell) loadBuilderFrom(customShell); openBuilderUI(); };
function openBuilderForEvent(e){ builderTarget=e;                // opened from a timeline shell event
  if(e.custom) loadBuilderFrom(e.custom);
  else { builder=defaultBuilder(); builder.shells[0].base=(e.shell&&SHELL_DEFS[e.shell]&&e.shell!=='custom')?e.shell:'peony'; }
  openBuilderUI(); }
document.getElementById('bReset').onclick=()=>{ builder=defaultBuilder(); genPreviewFrags('peony',0); syncBuilderControls(); drawBuilder(); };
document.getElementById('bUse').onclick=()=>{
  const cfg=builderConfig();
  if(builderTarget){                                             // write back into the event, then reopen its editor
    builderTarget.custom=cfg; builderTarget.shell='custom';
    builderOverlay.classList.remove('on');
    tlRefresh(); openEditor(builderTarget, lastClick.x, lastClick.y);
    builderTarget=null; return;
  }
  customShell=cfg; curShell='custom'; customOpt.hidden=false; shellSel.value='custom';
  openBuilder.classList.add('on'); syncSliders(); builderOverlay.classList.remove('on'); };
builderOverlay.addEventListener('pointerdown',e=>{ if(e.target===builderOverlay) builderOverlay.classList.remove('on'); });
window.addEventListener('resize',()=>{ if(builderOverlay.classList.contains('on')){ fitBuilderCanvas(); drawBuilder(); } });

/* ---------------- rapid fire ---------------- */
const RAPID_SHELLS=['peony','chrys','star','heart','willow','palm','ring'];
let rapidTimer=null, ptrX=0, ptrY=0, ptrSeen=false;
window.addEventListener('pointermove',e=>{ ptrX=e.clientX; ptrY=e.clientY; ptrSeen=true; },{passive:true});
function rapidShot(){
  if(builderOverlay.classList.contains('on')) return;                 // don't fire behind the dialog
  if(ptrSeen && document.elementFromPoint(ptrX,ptrY)?.closest('#dock')) return;   // not while pointing at controls
  const px = ptrSeen? ptrX : W*0.5;
  let py = ptrSeen? ptrY : horizonY*0.35;
  if(py > horizonY-60) py = horizonY-60;                              // keep it in the sky
  py = Math.max(py, H*0.08);
  const savedShell=curShell;
  curShell=RAPID_SHELLS[(Math.random()*RAPID_SHELLS.length)|0];       // random default shell
  launch(px,py);
  curShell=savedShell;
}
const rapidBtn=document.getElementById('rapid');
rapidBtn.onclick=()=>{
  if(rapidTimer){ clearInterval(rapidTimer); rapidTimer=null; rapidBtn.classList.remove('on'); return; }
  ensureAudio(); rapidBtn.classList.add('on'); rapidShot();
  rapidTimer=setInterval(rapidShot,500);                              // .5s intervals, follows the pointer
};
